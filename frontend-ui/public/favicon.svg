<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#starGrad)"/>

  <!-- Stylized S made of sound waves -->
  <g fill="none" stroke="white" stroke-width="3" stroke-linecap="round">
    <!-- Top arc of S -->
    <path d="M 22 20 Q 22 14, 32 14 Q 42 14, 42 22 Q 42 28, 32 30" opacity="0.95"/>
    <!-- Bottom arc of S -->
    <path d="M 32 34 Q 22 36, 22 42 Q 22 50, 32 50 Q 42 50, 42 44" opacity="0.95"/>
  </g>

  <!-- Sound wave accents -->
  <g fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <path d="M 46 26 Q 50 32, 46 38"/>
    <path d="M 50 22 Q 56 32, 50 42"/>
  </g>

  <!-- Star sparkle accent -->
  <g fill="white" opacity="0.8">
    <circle cx="18" cy="18" r="2"/>
    <path d="M 18 14 L 18 16 M 18 20 L 18 22 M 14 18 L 16 18 M 20 18 L 22 18" stroke="white" stroke-width="1.5"/>
  </g>
</svg>
