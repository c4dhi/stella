syntax = "proto3";
package tts;

service TextToSpeech {
  // Synthesize text to audio (returns complete audio)
  rpc Synthesize(SynthesizeRequest) returns (SynthesizeResponse);

  // Synthesize text to streaming audio chunks
  rpc SynthesizeStream(SynthesizeRequest) returns (stream AudioChunk);

  // Warm up the TTS model — runs a tiny throwaway synth so the next real
  // request hits warm CUDA kernels / cudnn benchmark caches / loaded
  // weights. Safe to call repeatedly (cheap no-op once warm).
  rpc Warmup(WarmupRequest) returns (WarmupResponse);

  // Health check
  rpc HealthCheck(Empty) returns (HealthResponse);

  // Report the voices and languages the *active* provider can synthesize,
  // so callers (the deploy UI) offer agents only provider-valid choices.
  rpc GetCapabilities(Empty) returns (CapabilitiesResponse);
}

message Empty {}

message SynthesizeRequest {
  string text = 1;              // Text to synthesize
  string session_id = 2;        // Session identifier
  string voice = 3;             // Optional voice override
  float speed = 4;              // Speech rate (0.5-2.0, default 1.0)
  string language = 5;          // Optional ISO 639-1 language code (e.g., "en", "de")
}

message SynthesizeResponse {
  bytes audio_data = 1;         // Raw PCM audio (16-bit, 16kHz, mono)
  int32 sample_rate = 2;        // Sample rate (16000)
  int32 duration_ms = 3;        // Audio duration in milliseconds
}

message AudioChunk {
  bytes audio_data = 1;         // Raw PCM audio chunk
  bool is_final = 2;            // True if last chunk
  int32 chunk_index = 3;        // Chunk sequence number
}

message HealthResponse {
  bool healthy = 1;
  string provider = 2;          // Active TTS provider (piper, kokoro, chatterbox, voxtral)
  string version = 3;
}

message WarmupRequest {
  string session_id = 1;        // Caller's session id (for analytics)
}

message WarmupResponse {
  bool success = 1;
  int32 warmup_time_ms = 2;     // Time taken for warm-up synthesis
  string provider = 3;          // The provider that was warmed
  string message = 4;           // Human-readable status / error detail
}

// A single selectable voice and the languages it has a native clip for.
message VoiceInfo {
  string id = 1;                     // Stable id sent back as SynthesizeRequest.voice
  string display_name = 2;           // Human-friendly label for the UI
  repeated string languages = 3;     // ISO 639-1 codes this voice has a native clip for
  string default_language = 4;       // Fallback language when none requested
}

message CapabilitiesResponse {
  string provider = 1;               // Active provider name (qwen3, kokoro, ...)
  repeated VoiceInfo voices = 2;     // Selectable voices (>=1)
  repeated string languages = 3;     // ISO codes the provider can speak (broad set)
  string default_voice = 4;          // Voice used when none requested
  bool supports_voice_selection = 5; // True when more than one voice is selectable
}
