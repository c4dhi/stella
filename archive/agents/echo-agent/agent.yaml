version: "1.0"

metadata:
  name: "Echo Agent"
  slug: "echo-agent"
  version: "1.0.0"
  description: "Simple test agent that echoes user input back. Great for testing audio pipelines."
  icon: "🔊"
  tags:
    - testing
    - audio

capabilities:
  - voice
  - text

image:
  dockerfile: "Dockerfile"

resources:
  memory:
    request: "256Mi"
    limit: "512Mi"
  cpu:
    request: "100m"
    limit: "500m"

configSchema:
  type: object
  properties: {}
  x-stella-optional-env-vars:
    - name: INTERRUPT_MODE
      description: "Transcript interrupt behavior: 'none' (turn-based gating, default) or 'smart' (barge-in with re-prompting)"
      default: "none"
    - name: TTS_ENABLED
      description: "Enable text-to-speech audio output. Set to 'false' for text-only mode."
      default: "true"
    - name: TRANSCRIPT_DEBOUNCE_MS
      description: "Debounce window (ms) for aggregating rapid successive final transcripts. 0 to disable."
      default: "300"

defaultConfig: {}

sdk:
  minVersion: "0.4.0"
