apiVersion: v1
kind: ServiceAccount
metadata:
  name: session-management-sa
  namespace: ai-agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-manager
  namespace: ai-agents
rules:
- apiGroups: [""]
  resources: ["pods", "secrets", "configmaps"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: session-management-binding
  namespace: ai-agents
subjects:
- kind: ServiceAccount
  name: session-management-sa
  namespace: ai-agents
roleRef:
  kind: Role
  name: agent-manager
  apiGroup: rbac.authorization.k8s.io
