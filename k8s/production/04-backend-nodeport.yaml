# Backend API NodePort Service for Production
# This service exposes Backend on NodePort 30000 for external access
# Used with nginx reverse proxy at https://backend.DOMAIN (port 443 -> 30000)
apiVersion: v1
kind: Service
metadata:
  name: session-management-server-nodeport
  namespace: ai-agents
  labels:
    app: session-management-server
    env: production
spec:
  selector:
    app: session-management-server
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
      protocol: TCP
      name: http
