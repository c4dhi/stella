# PostgreSQL NodePort Service for Production
# This service exposes PostgreSQL on NodePort 30432 for external access
# Used with nginx reverse proxy at db.DOMAIN:5432
apiVersion: v1
kind: Service
metadata:
  name: postgres-nodeport
  namespace: ai-agents
  labels:
    app: postgres
    env: production
spec:
  selector:
    app: postgres
  type: NodePort
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
      protocol: TCP
      name: postgres
