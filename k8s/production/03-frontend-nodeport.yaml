# Frontend UI NodePort Service for Production
# This service exposes Frontend on NodePort 30080 for external access
# Used with nginx reverse proxy at https://frontend.DOMAIN (port 443 -> 30080)
apiVersion: v1
kind: Service
metadata:
  name: frontend-ui-nodeport
  namespace: ai-agents
  labels:
    app: frontend-ui
    env: production
spec:
  selector:
    app: frontend-ui
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
      name: http
