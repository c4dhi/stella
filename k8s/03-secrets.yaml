apiVersion: v1
kind: Secret
metadata:
  name: grace-ai-secrets
  namespace: ai-agents
type: Opaque
stringData:
  # PostgreSQL credentials - Injected from .env file by startup script
  # postgres-db: ""
  # postgres-user: ""
  # postgres-password: ""
  # database-url: ""

  # JWT
  jwt-secret: "dev-secret-change-in-production"

  # LiveKit - External Server Credentials
  # IMPORTANT: These must match the credentials configured on the external LiveKit server
  # Server: livekit-v1.c4dhi.moserfelix.com
  # Actual values are injected from .env file by startup script
  livekit-api-key: "devkey"
  livekit-api-secret: "secret"
  livekit-webhook-secret: "webhook-secret"

  # OpenAI - Injected from .env file by startup script
  # openai-api-key: ""

  # ElevenLabs (optional)
  elevenlabs-api-key: ""
