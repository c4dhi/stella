apiVersion: v1
kind: Service
metadata:
  name: stt-service
  namespace: ai-agents
spec:
  selector:
    app: stt-service
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stt-service
  namespace: ai-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stt-service
  template:
    metadata:
      labels:
        app: stt-service
    spec:
      # Uncomment for GPU deployments (production):
      # runtimeClassName: nvidia
      containers:
      - name: stt-service
        image: stt-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50051
          name: grpc
        env:
        - name: GRPC_PORT
          value: "50051"
        - name: LOG_LEVEL
          value: "INFO"
        - name: PYTHONUNBUFFERED
          value: "1"
        # ====================================================================
        # Provider Selection
        # ====================================================================
        - name: STT_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: STT_PROVIDER
              optional: true
        # ====================================================================
        # Sherpa-ONNX Configuration (when STT_PROVIDER=sherpa)
        # ====================================================================
        - name: ONNX_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: ONNX_PROVIDER
              optional: true
        # ====================================================================
        # faster-whisper Configuration (when STT_PROVIDER=whisper)
        # ====================================================================
        - name: WHISPER_MODEL
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: WHISPER_MODEL
              optional: true
        - name: WHISPER_DEVICE
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: WHISPER_DEVICE
              optional: true
        - name: WHISPER_COMPUTE_TYPE
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: WHISPER_COMPUTE_TYPE
              optional: true
        - name: WHISPER_LANGUAGE
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: WHISPER_LANGUAGE
              optional: true
        - name: WHISPER_BEAM_SIZE
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: WHISPER_BEAM_SIZE
              optional: true
        # ====================================================================
        # VAD Configuration
        # ====================================================================
        - name: VAD_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: VAD_THRESHOLD
              optional: true
        - name: VAD_MIN_SILENCE_MS
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: VAD_MIN_SILENCE_MS
              optional: true
        - name: PARTIAL_INTERVAL_MS
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: PARTIAL_INTERVAL_MS
              optional: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
            # Uncomment for GPU (production with large-v3):
            # nvidia.com/gpu: "1"
          limits:
            memory: "2Gi"
            cpu: "1000m"
            # Uncomment for GPU (production with large-v3):
            # nvidia.com/gpu: "1"
        # Note: For production GPU mode with large-v3, increase to:
        #   requests: memory: "6Gi"
        #   limits: memory: "10Gi"
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "import grpc; print('ready')"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import grpc; print('alive')"
          initialDelaySeconds: 60
          periodSeconds: 60
          timeoutSeconds: 5
