apiVersion: v1
kind: Service
metadata:
  name: livekit
  namespace: ai-agents
spec:
  selector:
    app: livekit
  ports:
    - name: http
      port: 7880
      targetPort: 7880
    - name: rtp
      port: 7881
      targetPort: 7881
      protocol: UDP
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: ai-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      containers:
      - name: livekit
        image: livekit/livekit-server:v1.9.1
        args:
          - --dev
          - --bind
          - "0.0.0.0"
        ports:
        - containerPort: 7880
          protocol: TCP
        - containerPort: 7881
          protocol: UDP
        env:
        - name: LIVEKIT_PORT
          value: "7880"
        - name: LIVEKIT_API_KEY
          valueFrom:
            secretKeyRef:
              name: grace-ai-secrets
              key: livekit-api-key
        - name: LIVEKIT_API_SECRET
          valueFrom:
            secretKeyRef:
              name: grace-ai-secrets
              key: livekit-api-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
