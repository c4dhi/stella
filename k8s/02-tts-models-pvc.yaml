# =============================================================================
# TTS Models Persistent Volume Claim
# =============================================================================
# Storage for TTS models to avoid baking into Docker images:
# - Kokoro model: ~300MB (kokoro-v1.0.onnx)
# - Kokoro voices: ~200MB (voices-v1.0.bin)
# - ChatterBox multilingual: ~2GB (ve.pt, t3_mtl23ls_v2.safetensors, s3gen.pt, etc.)
# - Qwen3-TTS (opt-in, Apache-2.0): ~2GB for the 0.6B-Base variant, ~5GB for
#   the 1.7B variants. The init container downloads them on first deploy.
#   Bump storage to >=10Gi if you plan to switch between Qwen3 variants.
# =============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tts-models-pvc
  namespace: ai-agents
  labels:
    app: tts-service
    component: models
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
