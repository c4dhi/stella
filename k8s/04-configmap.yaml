apiVersion: v1
kind: ConfigMap
metadata:
  name: stella-ai-config
  namespace: ai-agents
data:
  # Server Configuration
  PORT: "3000"
  NODE_ENV: "${NODE_ENV}"

  # API Prefix - Disabled (all routes at root level)
  API_PREFIX: ""

  # CORS Configuration
  # Automatically set by deployment scripts based on environment
  CORS_ORIGIN: "${CORS_ORIGIN}"

  # LiveKit (external server - runs in Docker on host, outside minikube)
  # LIVEKIT_URL: Internal connection from K8s pods to host LiveKit (no SSL)
  # PUBLIC_LIVEKIT_URL: Public connection for browsers (with SSL through Caddy)
  LIVEKIT_URL: "${LIVEKIT_URL}"
  PUBLIC_LIVEKIT_URL: "${PUBLIC_LIVEKIT_URL}"

  # TURN Server Configuration
  LIVEKIT_TURN_ENABLED: "${LIVEKIT_TURN_ENABLED}"
  LIVEKIT_TURN_DOMAIN: "${LIVEKIT_TURN_DOMAIN}"

  # Kubernetes
  KUBERNETES_NAMESPACE: "ai-agents"
  AGENT_IMAGE: "conversational-ai-server:latest"
  AGENT_IMAGE_PULL_POLICY: "IfNotPresent"

  # STT Service (microservices architecture)
  STT_SERVICE_URL: "stt-service:50051"

  # TTS Service (microservices architecture)
  TTS_SERVICE_URL: "tts-service:50052"

  # State Machine Service (shares gRPC port with agent registration on session-management-server)
  STATE_MACHINE_ADDRESS: "session-management-server:50051"

  # DNS Configuration (production only)
  # CUSTOM_DNS_SERVERS: External DNS to bypass SSL inspection for model downloads (STT/TTS init containers)
  # KUBERNETES_DNS_IP: K8s CoreDNS IP for agent pods to resolve internal services
  # Find K8s DNS IP with: kubectl get svc -n kube-system kube-dns -o jsonpath='{.spec.clusterIP}'
  CUSTOM_DNS_SERVERS: "${CUSTOM_DNS_SERVERS}"
  KUBERNETES_DNS_IP: "${KUBERNETES_DNS_IP}"

  # ============================================================================
  # AI Agent Configuration (Python conversational-ai-server)
  # ============================================================================
  # Speech-to-Text (STT) Provider
  # Options: sherpa (lightweight CPU), whisper (GPU-accelerated)
  STT_PROVIDER: "${STT_PROVIDER}"

  # faster-whisper Configuration (when STT_PROVIDER=whisper)
  WHISPER_MODEL: "${WHISPER_MODEL}"          # tiny.en, small.en, medium.en, large-v3
  WHISPER_DEVICE: "${WHISPER_DEVICE}"        # cpu or cuda
  WHISPER_COMPUTE_TYPE: "${WHISPER_COMPUTE_TYPE}"  # int8 (CPU) or float16 (GPU)
  WHISPER_LANGUAGE: "${WHISPER_LANGUAGE}"    # en, de, etc. or empty for auto-detect
  WHISPER_BEAM_SIZE: "${WHISPER_BEAM_SIZE}"  # 1=greedy (fastest), 5=beam search (more accurate)

  # VAD Configuration (Silero VAD for whisper provider)
  VAD_THRESHOLD: "${VAD_THRESHOLD}"                              # Speech detection sensitivity (0-1, default 0.5)
  VAD_SILENCE_DURATION_MS: "${VAD_SILENCE_DURATION_MS}"          # Silence before MAYBE_ENDING state (default 800ms)
  VAD_CONTINUATION_WINDOW_MS: "${VAD_CONTINUATION_WINDOW_MS}"    # Time for speech to resume in MAYBE_ENDING (default 1000ms)
  VAD_MAX_ENDPOINTING_DELAY_MS: "${VAD_MAX_ENDPOINTING_DELAY_MS}" # Hard cutoff for endpointing (default 2000ms)
  VAD_MIN_SPEECH_MS: "${VAD_MIN_SPEECH_MS}"                      # Minimum speech duration (default 500ms)
  VAD_MAX_SPEECH_DURATION_MS: "${VAD_MAX_SPEECH_DURATION_MS}"    # Force endpoint after this (default 30000ms)
  VAD_AUDIO_INACTIVITY_TIMEOUT_MS: "${VAD_AUDIO_INACTIVITY_TIMEOUT_MS}" # Force endpoint on no audio (default 1500ms)
  VAD_RMS_THRESHOLD: "${VAD_RMS_THRESHOLD}"                      # Energy gate threshold (default 0.008)
  PARTIAL_INTERVAL_MS: "${PARTIAL_INTERVAL_MS}"                  # Partial transcript interval (default 1000ms)
  WHISPER_INITIAL_PROMPT: "${WHISPER_INITIAL_PROMPT}"            # Domain context prompt for improved accuracy

  # Text-to-Speech (TTS) Provider
  # Options: piper (fast local CPU), kokoro (local GPU), chatterbox (multilingual), qwen3 (real-time GPU via faster-qwen3-tts), elevenlabs (best quality), auto
  TTS_PROVIDER: "${TTS_PROVIDER}"
  ELEVENLABS_VOICE_ID: "${ELEVENLABS_VOICE_ID}"
  ELEVENLABS_MODEL_ID: "${ELEVENLABS_MODEL_ID}"

  # Qwen3-TTS (only used when TTS_PROVIDER=qwen3)
  # Apache-2.0 weights run IN-PROCESS in the tts-service container via
  # faster-qwen3-tts (MIT). The init container pre-stages the chosen
  # variant onto the PVC; the operator must also place a reference WAV
  # at QWEN3_REF_AUDIO (default /models/qwen3/ref_audio.mp3 — STELLA
  # bundles a German one) and its transcript at QWEN3_REF_TEXT — the
  # model's voice-clone API requires both even for Base variants.
  QWEN3_MODEL_ID: "${QWEN3_MODEL_ID}"
  QWEN3_REF_AUDIO: "${QWEN3_REF_AUDIO}"
  QWEN3_REF_TEXT: "${QWEN3_REF_TEXT}"
  QWEN3_LANGUAGE: "${QWEN3_LANGUAGE}"
  QWEN3_CHUNK_SIZE: "${QWEN3_CHUNK_SIZE}"
  QWEN3_DTYPE: "${QWEN3_DTYPE}"

  # ONNX Runtime Provider Configuration
  # Set by start-k8s.sh based on ENABLE_GPU setting
  # GPU mode: CUDAExecutionProvider,CPUExecutionProvider
  # CPU mode: CPUExecutionProvider
  ONNX_PROVIDER: "${ONNX_PROVIDER}"

  # ============================================================================
  # Audio Processing Configuration
  # ============================================================================
  # Acoustic Echo Cancellation (AEC) - Disable for debugging audio issues
  # When enabled (default), AEC removes TTS echo from microphone input
  # Set to "true" to disable AEC if audio is being incorrectly canceled
  DISABLE_AEC: "${DISABLE_AEC:-false}"

  # ============================================================================
  # Public URLs for external access (injected by deployment scripts)
  # ============================================================================
  # Local (NODE_ENV=local):
  #   - Uses localhost with standard ports (8080, 3000)
  # Production (NODE_ENV=production):
  #   - Uses custom domains with SSL (frontend.DOMAIN, backend.DOMAIN)
  PUBLIC_API_URL: "${PUBLIC_API_URL}"
  PUBLIC_FRONTEND_URL: "${PUBLIC_FRONTEND_URL}"

  # Database public access (for external tools)
  PUBLIC_DB_HOST: "${PUBLIC_DB_HOST}"
  PUBLIC_DB_PORT: "${PUBLIC_DB_PORT}"

  # ============================================================================
  # Frontend runtime configuration
  # ============================================================================
  # These are injected into the frontend at container startup
  # Frontend (browser) connects to:
  #   - API for REST endpoints and LiveKit token generation
  #   - LiveKit for WebSocket/WebRTC connections (uses PUBLIC_LIVEKIT_URL)
  # Note: LiveKit credentials are kept secure on the backend only
  VITE_API_URL: "${PUBLIC_API_URL}"
  VITE_LIVEKIT_URL: "${PUBLIC_LIVEKIT_URL}"
