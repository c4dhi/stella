apiVersion: v1
kind: ConfigMap
metadata:
  name: grace-ai-config
  namespace: ai-agents
data:
  # Server
  PORT: "3000"
  NODE_ENV: "production"  # Changed to production for Kubernetes deployment

  # API Prefix - Disabled (all routes at root level)
  API_PREFIX: ""

  # CORS Configuration
  # Allow requests from the frontend
  CORS_ORIGIN: "http://PUBLIC_DOMAIN_PLACEHOLDER:8080"

  # LiveKit (internal cluster communication)
  LIVEKIT_URL: "ws://livekit:7880"

  # Kubernetes
  KUBERNETES_NAMESPACE: "ai-agents"
  AGENT_IMAGE: "conversational-ai-server:latest"
  AGENT_IMAGE_PULL_POLICY: "IfNotPresent"

  # TTS Provider
  TTS_PROVIDER: "opensource"

  # ============================================================================
  # Public URLs for external access (replaced by start-k8s.sh script)
  # ============================================================================
  # Direct IP:port access using standard ports
  # Port-forwards bind to standard ports for easy access
  PUBLIC_SERVER_URL: "http://PUBLIC_DOMAIN_PLACEHOLDER:3000"
  PUBLIC_LIVEKIT_URL: "ws://PUBLIC_DOMAIN_PLACEHOLDER:7880"
  PUBLIC_FRONTEND_URL: "http://PUBLIC_DOMAIN_PLACEHOLDER:8080"

  # ============================================================================
  # Frontend runtime configuration
  # ============================================================================
  # Direct IP:port access (matches PUBLIC URLs above)
  VITE_API_URL: "http://PUBLIC_DOMAIN_PLACEHOLDER:3000"
  VITE_LIVEKIT_URL: "ws://PUBLIC_DOMAIN_PLACEHOLDER:7880"

  # LiveKit Credentials
  VITE_LIVEKIT_API_KEY: "devkey"
  VITE_LIVEKIT_API_SECRET: "secret"
