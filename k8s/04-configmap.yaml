apiVersion: v1
kind: ConfigMap
metadata:
  name: grace-ai-config
  namespace: ai-agents
data:
  # Server
  PORT: "3000"
  NODE_ENV: "development"

  # LiveKit
  LIVEKIT_URL: "ws://livekit:7880"

  # Kubernetes
  KUBERNETES_NAMESPACE: "ai-agents"
  AGENT_IMAGE: "conversational-ai-server:latest"
  AGENT_IMAGE_PULL_POLICY: "IfNotPresent"

  # TTS Provider
  TTS_PROVIDER: "opensource"

  # Public URLs for external access (uses PUBLIC_DOMAIN from .env)
  # These are replaced by the start script with the PUBLIC_DOMAIN value
  PUBLIC_SERVER_URL: "http://PUBLIC_DOMAIN_PLACEHOLDER:3000"
  PUBLIC_LIVEKIT_URL: "ws://PUBLIC_DOMAIN_PLACEHOLDER:7880"
  PUBLIC_FRONTEND_URL: "http://PUBLIC_DOMAIN_PLACEHOLDER"

  # Frontend runtime configuration
  # Using PUBLIC_DOMAIN_PLACEHOLDER which gets replaced by start-k8s.sh
  VITE_API_URL: "http://PUBLIC_DOMAIN_PLACEHOLDER:3000"
  VITE_LIVEKIT_URL: "ws://PUBLIC_DOMAIN_PLACEHOLDER:7880"
  VITE_LIVEKIT_API_KEY: "devkey"
  VITE_LIVEKIT_API_SECRET: "secret"
