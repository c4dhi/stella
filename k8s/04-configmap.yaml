apiVersion: v1
kind: ConfigMap
metadata:
  name: grace-ai-config
  namespace: ai-agents
data:
  # Server Configuration
  PORT: "3000"
  NODE_ENV: "${NODE_ENV}"

  # API Prefix - Disabled (all routes at root level)
  API_PREFIX: ""

  # CORS Configuration
  # Automatically set by deployment scripts based on environment
  CORS_ORIGIN: "${CORS_ORIGIN}"

  # LiveKit (external server - runs in Docker on host, outside minikube)
  # LIVEKIT_URL: Internal connection from K8s pods to host LiveKit (no SSL)
  # PUBLIC_LIVEKIT_URL: Public connection for browsers (with SSL through Caddy)
  LIVEKIT_URL: "${LIVEKIT_URL}"
  PUBLIC_LIVEKIT_URL: "${PUBLIC_LIVEKIT_URL}"

  # TURN Server Configuration
  LIVEKIT_TURN_ENABLED: "${LIVEKIT_TURN_ENABLED}"
  LIVEKIT_TURN_DOMAIN: "${LIVEKIT_TURN_DOMAIN}"

  # Kubernetes
  KUBERNETES_NAMESPACE: "ai-agents"
  AGENT_IMAGE: "conversational-ai-server:latest"
  AGENT_IMAGE_PULL_POLICY: "IfNotPresent"

  # STT Service (microservices architecture)
  STT_SERVICE_URL: "stt-service:50051"

  # TTS Service (microservices architecture)
  TTS_SERVICE_URL: "tts-service:50052"

  # Kubernetes DNS Configuration (production only)
  # Auto-detected at deployment time or from .env
  # K3s: 10.43.0.10, Minikube: 10.96.0.10
  KUBERNETES_DNS_NAMESERVER: "${KUBERNETES_DNS_NAMESERVER}"

  # ============================================================================
  # AI Agent Configuration (Python conversational-ai-server)
  # ============================================================================
  # Speech-to-Text (STT) Provider
  # Options: sherpa (lightweight CPU), whisper (GPU-accelerated)
  STT_PROVIDER: "${STT_PROVIDER}"

  # faster-whisper Configuration (when STT_PROVIDER=whisper)
  WHISPER_MODEL: "${WHISPER_MODEL}"          # tiny.en, small.en, medium.en, large-v3
  WHISPER_DEVICE: "${WHISPER_DEVICE}"        # cpu or cuda
  WHISPER_COMPUTE_TYPE: "${WHISPER_COMPUTE_TYPE}"  # int8 (CPU) or float16 (GPU)
  WHISPER_LANGUAGE: "${WHISPER_LANGUAGE}"    # en, de, etc. or empty for auto-detect
  WHISPER_BEAM_SIZE: "${WHISPER_BEAM_SIZE}"  # 1=greedy (fastest), 5=beam search (more accurate)

  # VAD Configuration (Silero VAD for whisper provider)
  VAD_THRESHOLD: "${VAD_THRESHOLD}"          # Speech detection sensitivity (0.0-1.0, default 0.5)
  VAD_MIN_SILENCE_MS: "${VAD_MIN_SILENCE_MS}"  # End-of-speech silence threshold (default 500ms)
  PARTIAL_INTERVAL_MS: "${PARTIAL_INTERVAL_MS}"  # Partial transcript interval (default 1000ms)

  # Text-to-Speech (TTS) Provider
  # Options: kokoro (fast local), elevenlabs (best quality), edge_tts (free cloud), auto
  TTS_PROVIDER: "${TTS_PROVIDER}"
  ELEVENLABS_VOICE_ID: "${ELEVENLABS_VOICE_ID}"
  ELEVENLABS_MODEL_ID: "${ELEVENLABS_MODEL_ID}"

  # ONNX Runtime Provider Configuration
  # Set by start-k8s.sh based on ENABLE_GPU setting
  # GPU mode: CUDAExecutionProvider,CPUExecutionProvider
  # CPU mode: CPUExecutionProvider
  ONNX_PROVIDER: "${ONNX_PROVIDER}"

  # ============================================================================
  # Public URLs for external access (injected by deployment scripts)
  # ============================================================================
  # Local (NODE_ENV=local):
  #   - Uses localhost with standard ports (8080, 3000)
  # Production (NODE_ENV=production):
  #   - Uses custom domains with SSL (frontend.DOMAIN, backend.DOMAIN)
  PUBLIC_API_URL: "${PUBLIC_API_URL}"
  PUBLIC_FRONTEND_URL: "${PUBLIC_FRONTEND_URL}"

  # Database public access (for external tools)
  PUBLIC_DB_HOST: "${PUBLIC_DB_HOST}"
  PUBLIC_DB_PORT: "${PUBLIC_DB_PORT}"

  # ============================================================================
  # Frontend runtime configuration
  # ============================================================================
  # These are injected into the frontend at container startup
  # Frontend (browser) connects to:
  #   - API for REST endpoints and LiveKit token generation
  #   - LiveKit for WebSocket/WebRTC connections (uses PUBLIC_LIVEKIT_URL)
  # Note: LiveKit credentials are kept secure on the backend only
  VITE_API_URL: "${PUBLIC_API_URL}"
  VITE_LIVEKIT_URL: "${PUBLIC_LIVEKIT_URL}"
