apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
  namespace: ai-agents
data:
  config.yaml: |
    # LiveKit Production Configuration
    # This config is injected with environment variables at deployment time

    port: 7880
    log_level: info

    # API keys for authentication
    keys:
      ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

    rtc:
      # TCP fallback for UDP-blocked networks
      tcp_port: 7881

      # UDP multiplexing ports (10 ports for efficient connection handling)
      # Adjust based on expected concurrent users (2 ports per user)
      # 10 ports = ~500 concurrent users
      udp_port: 7882-7892

      # Port range for UDP (required for proper ICE candidate generation)
      port_range_start: 7882
      port_range_end: 7892

      # ICE mode: Set by deployment script based on NODE_ENV
      # Local: false (full ICE negotiation for Kubernetes networking)
      # Production: true (optimized single-candidate ICE)
      use_ice_lite: ${LIVEKIT_USE_ICE_LITE}

      # External IP discovery: Set by deployment script based on NODE_ENV
      # Local: true (auto-discover pod IP via STUN)
      # Production: false (use configured node_ip domain)
      use_external_ip: ${LIVEKIT_USE_EXTERNAL_IP}

      # Node IP for ICE candidates: Set by deployment script based on NODE_ENV
      # Local: empty (LiveKit auto-discovers pod IP)
      # Production: livekit.c4dhi.moserfelix.com (public domain)
      node_ip: ${LIVEKIT_NODE_IP}

    turn:
      # Enable built-in TURN server for NAT traversal
      # Essential for mobile networks and corporate firewalls
      # Disabled for local development (localhost), enabled for production
      enabled: ${LIVEKIT_TURN_ENABLED}

      # TURN domain - extracted from PUBLIC_LIVEKIT_URL environment variable
      # Will be substituted at deployment time by start-k8s.sh
      domain: ${LIVEKIT_TURN_DOMAIN}

      # TURN over UDP on port 443 - works through most firewalls
      udp_port: 443

      # External TLS termination (nginx handles TLS)
      # This tells LiveKit NOT to look for cert_file/key_file
      external_tls: true
