apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-recorder
  namespace: ai-agents
spec:
  replicas: 1  # Single instance handles all rooms
  selector:
    matchLabels:
      app: message-recorder
  template:
    metadata:
      labels:
        app: message-recorder
    spec:
      # Add host.docker.internal to /etc/hosts
      # OrbStack gateway is typically 192.168.194.1
      hostAliases:
      - ip: "192.168.194.1"
        hostnames:
        - "host.docker.internal"
      containers:
      - name: message-recorder
        image: message-recorder-python:latest
        imagePullPolicy: IfNotPresent  # Use local image from K3s
        env:
        # External LiveKit Server (read from ConfigMap)
        - name: LIVEKIT_URL
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: LIVEKIT_URL
        - name: SESSION_SERVER_URL
          value: "http://session-management-server:3000"
        - name: POLL_INTERVAL
          value: "10"  # Poll every 10 seconds
        - name: LIVEKIT_API_KEY
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: livekit-api-key
        - name: LIVEKIT_API_SECRET
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: livekit-api-secret
        command: ["python", "-u", "main.py"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # Health check (optional - check if service is responsive)
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "print('alive')"
          initialDelaySeconds: 30
          periodSeconds: 60
