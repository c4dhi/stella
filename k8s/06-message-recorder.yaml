apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-recorder
  namespace: ai-agents
spec:
  replicas: 1  # Single instance handles all rooms
  selector:
    matchLabels:
      app: message-recorder
  template:
    metadata:
      labels:
        app: message-recorder
    spec:
      containers:
      - name: message-recorder
        image: message-recorder-python:latest
        imagePullPolicy: Never  # Use local image from minikube
        env:
        # External LiveKit Server (read from ConfigMap)
        - name: LIVEKIT_URL
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: LIVEKIT_URL
        - name: SESSION_SERVER_URL
          value: "http://session-management-server:3000"
        - name: POLL_INTERVAL
          value: "10"  # Poll every 10 seconds
        - name: LIVEKIT_API_KEY
          valueFrom:
            secretKeyRef:
              name: grace-ai-secrets
              key: livekit-api-key
        - name: LIVEKIT_API_SECRET
          valueFrom:
            secretKeyRef:
              name: grace-ai-secrets
              key: livekit-api-secret
        command: ["/bin/sh", "-c"]
        args:
        - |
          # Update /etc/hosts with host IP in production mode
          if [ "${NODE_ENV}" = "production" ]; then
            if [ -n "${HOST_IP}" ]; then
              echo "${HOST_IP} host.minikube.internal" >> /etc/hosts
              echo "Production: Updated /etc/hosts with host IP: ${HOST_IP}"
            else
              echo "ERROR: Production mode but HOST_IP not set!"
              exit 1
            fi
          else
            echo "Development: Using native host.minikube.internal resolution"
          fi
          # Start the Python application (unbuffered output for real-time logs)
          exec python -u main.py
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # Health check (optional - check if service is responsive)
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "print('alive')"
          initialDelaySeconds: 30
          periodSeconds: 60
