apiVersion: v1
kind: Service
metadata:
  name: tts-service
  namespace: ai-agents
  labels:
    app: tts-service
spec:
  selector:
    app: tts-service
  ports:
    - port: 50052
      targetPort: 50052
      name: grpc
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-service
  namespace: ai-agents
  labels:
    app: tts-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tts-service
  template:
    metadata:
      labels:
        app: tts-service
    spec:
      # GPU: runtimeClassName: nvidia
      # ======================================================================
      # Init Container: Download Kokoro models to PersistentVolume
      # ======================================================================
      initContainers:
      - name: download-models
        image: tts-service:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "[TTS Init] Starting model download check..."

          # Get provider from env (default: piper)
          TTS_PROVIDER="${TTS_PROVIDER:-piper}"

          # ================================================================
          # Piper Model (when TTS_PROVIDER=piper or auto)
          # ================================================================
          if [ "$TTS_PROVIDER" = "piper" ] || [ "$TTS_PROVIDER" = "auto" ]; then
            PIPER_VOICE="${PIPER_VOICE:-en_US-lessac-medium}"
            PIPER_VERSION_FILE="/models/piper/.version"
            PIPER_VERSION="v1.0-${PIPER_VOICE}"

            if [ -f "$PIPER_VERSION_FILE" ] && [ "$(cat $PIPER_VERSION_FILE)" = "$PIPER_VERSION" ]; then
              echo "[TTS Init] Piper model already downloaded (version: $PIPER_VERSION)"
            else
              echo "[TTS Init] Downloading Piper model..."
              mkdir -p /models/piper
              PIPER_CACHE_DIR=/models/piper python download_piper_models.py
              echo "$PIPER_VERSION" > "$PIPER_VERSION_FILE"
              echo "[TTS Init] Piper model download complete"
            fi
          fi

          # ================================================================
          # Kokoro Model (when TTS_PROVIDER=kokoro or auto)
          # ================================================================
          if [ "$TTS_PROVIDER" = "kokoro" ] || [ "$TTS_PROVIDER" = "auto" ]; then
            KOKORO_VERSION_FILE="/models/kokoro/.version"
            KOKORO_VERSION="v1.0"

            if [ -f "$KOKORO_VERSION_FILE" ] && [ "$(cat $KOKORO_VERSION_FILE)" = "$KOKORO_VERSION" ]; then
              echo "[TTS Init] Kokoro model already downloaded (version: $KOKORO_VERSION)"
            else
              echo "[TTS Init] Downloading Kokoro model..."
              mkdir -p /models/kokoro
              KOKORO_CACHE_DIR=/models/kokoro python download_kokoro_models.py
              echo "$KOKORO_VERSION" > "$KOKORO_VERSION_FILE"
              echo "[TTS Init] Kokoro model download complete"
            fi

          elif [ "$TTS_PROVIDER" = "chatterbox" ]; then
            CHATTERBOX_VERSION_FILE="/models/chatterbox/.version"
            CHATTERBOX_VERSION="multilingual-v1.0"

            if [ -f "$CHATTERBOX_VERSION_FILE" ] && [ "$(cat $CHATTERBOX_VERSION_FILE)" = "$CHATTERBOX_VERSION" ]; then
              echo "[TTS Init] ChatterBox model already downloaded (version: $CHATTERBOX_VERSION)"
            else
              echo "[TTS Init] Downloading ChatterBox multilingual model..."
              mkdir -p /models/chatterbox
              CHATTERBOX_CACHE_DIR=/models/chatterbox python download_chatterbox_models.py
              echo "$CHATTERBOX_VERSION" > "$CHATTERBOX_VERSION_FILE"
              echo "[TTS Init] ChatterBox model download complete"
            fi

          else
            echo "[TTS Init] TTS_PROVIDER=$TTS_PROVIDER - no local models needed"
          fi

          echo "[TTS Init] Model initialization complete!"
        env:
        - name: TTS_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: TTS_PROVIDER
              optional: true
        volumeMounts:
        - name: model-cache
          mountPath: /models
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      containers:
      - name: tts-service
        image: tts-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50052
          name: grpc
        # Mount PV with models at cache directories
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/kokoro
          subPath: kokoro
        - name: model-cache
          mountPath: /root/.cache/chatterbox
          subPath: chatterbox
        - name: model-cache
          mountPath: /root/.cache/piper
          subPath: piper
        env:
        - name: GRPC_PORT
          value: "50052"
        - name: TTS_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: TTS_PROVIDER
              optional: true
        - name: ONNX_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: ONNX_PROVIDER
              optional: true
        - name: KOKORO_CACHE_DIR
          value: "/root/.cache/kokoro"
        - name: CHATTERBOX_CACHE_DIR
          value: "/root/.cache/chatterbox"
        - name: PIPER_CACHE_DIR
          value: "/root/.cache/piper"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
            # GPU: nvidia.com/gpu: "1"
          limits:
            memory: "2Gi"
            cpu: "2000m"
            # GPU: nvidia.com/gpu: "1"
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "import grpc; channel = grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(channel).result(timeout=5)"
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import grpc; channel = grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(channel).result(timeout=5)"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
      # ======================================================================
      # Volumes: PersistentVolume for model storage
      # ======================================================================
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: tts-models-pvc
