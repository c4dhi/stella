apiVersion: v1
kind: Service
metadata:
  name: tts-service
  namespace: ai-agents
  labels:
    app: tts-service
spec:
  selector:
    app: tts-service
  ports:
    - port: 50052
      targetPort: 50052
      name: grpc
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-service
  namespace: ai-agents
  labels:
    app: tts-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tts-service
  template:
    metadata:
      labels:
        app: tts-service
    spec:
      # GPU: runtimeClassName: nvidia
      # ======================================================================
      # Init Container: Download Kokoro models to PersistentVolume
      # ======================================================================
      initContainers:
      - name: download-models
        image: tts-service:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "[TTS Init] Starting model download check..."

          # Get provider from env (default: piper)
          TTS_PROVIDER="${TTS_PROVIDER:-piper}"

          # ================================================================
          # Piper Model (when TTS_PROVIDER=piper or auto)
          # ================================================================
          if [ "$TTS_PROVIDER" = "piper" ] || [ "$TTS_PROVIDER" = "auto" ]; then
            PIPER_VOICE="${PIPER_VOICE:-en_US-lessac-medium}"
            PIPER_VERSION_FILE="/models/piper/.version"
            PIPER_VERSION="v1.0-${PIPER_VOICE}"

            if [ -f "$PIPER_VERSION_FILE" ] && [ "$(cat $PIPER_VERSION_FILE)" = "$PIPER_VERSION" ]; then
              echo "[TTS Init] Piper model already downloaded (version: $PIPER_VERSION)"
            else
              echo "[TTS Init] Downloading Piper model..."
              mkdir -p /models/piper
              PIPER_CACHE_DIR=/models/piper python download_piper_models.py
              echo "$PIPER_VERSION" > "$PIPER_VERSION_FILE"
              echo "[TTS Init] Piper model download complete"
            fi
          fi

          # ================================================================
          # Kokoro Model (when TTS_PROVIDER=kokoro or auto)
          # ================================================================
          if [ "$TTS_PROVIDER" = "kokoro" ] || [ "$TTS_PROVIDER" = "auto" ]; then
            KOKORO_VERSION_FILE="/models/kokoro/.version"
            KOKORO_VERSION="v1.0"

            if [ -f "$KOKORO_VERSION_FILE" ] && [ "$(cat $KOKORO_VERSION_FILE)" = "$KOKORO_VERSION" ]; then
              echo "[TTS Init] Kokoro model already downloaded (version: $KOKORO_VERSION)"
            else
              echo "[TTS Init] Downloading Kokoro model..."
              mkdir -p /models/kokoro
              KOKORO_CACHE_DIR=/models/kokoro python download_kokoro_models.py
              echo "$KOKORO_VERSION" > "$KOKORO_VERSION_FILE"
              echo "[TTS Init] Kokoro model download complete"
            fi

          fi

          # ================================================================
          # ChatterBox Model (when TTS_PROVIDER=chatterbox or auto)
          # ================================================================
          if [ "$TTS_PROVIDER" = "chatterbox" ] || [ "$TTS_PROVIDER" = "auto" ]; then
            CHATTERBOX_VERSION_FILE="/models/chatterbox/.version"
            CHATTERBOX_VERSION="multilingual-v1.0"

            if [ -f "$CHATTERBOX_VERSION_FILE" ] && [ "$(cat $CHATTERBOX_VERSION_FILE)" = "$CHATTERBOX_VERSION" ]; then
              echo "[TTS Init] ChatterBox model already downloaded (version: $CHATTERBOX_VERSION)"
            else
              echo "[TTS Init] Downloading ChatterBox multilingual model..."
              mkdir -p /models/chatterbox
              CHATTERBOX_CACHE_DIR=/models/chatterbox python download_chatterbox_models.py
              echo "$CHATTERBOX_VERSION" > "$CHATTERBOX_VERSION_FILE"
              echo "[TTS Init] ChatterBox model download complete"
            fi

          fi

          # ================================================================
          # Voxtral 4B TTS (when TTS_PROVIDER=voxtral)
          #
          # Weights are CC-BY-NC-4.0 (non-commercial). STELLA only downloads
          # them when the operator explicitly sets
          # VOXTRAL_ACCEPT_NC_LICENSE=true in the ConfigMap — that env var
          # constitutes the operator's acceptance of the model license.
          # ================================================================
          if [ "$TTS_PROVIDER" = "voxtral" ]; then
            if [ "${VOXTRAL_ACCEPT_NC_LICENSE:-false}" != "true" ]; then
              echo "[TTS Init] TTS_PROVIDER=voxtral but VOXTRAL_ACCEPT_NC_LICENSE!=true."
              echo "[TTS Init] The Voxtral model is CC-BY-NC-4.0 (non-commercial)."
              echo "[TTS Init] Set VOXTRAL_ACCEPT_NC_LICENSE=true in the ConfigMap to"
              echo "[TTS Init] acknowledge the license and let the init container fetch"
              echo "[TTS Init] the weights, OR populate /models/voxtral yourself."
            else
              VOXTRAL_VERSION_FILE="/models/voxtral/.version"
              VOXTRAL_VERSION="${VOXTRAL_MODEL_ID:-mistralai/Voxtral-4B-TTS-2603}"

              if [ -f "$VOXTRAL_VERSION_FILE" ] && [ "$(cat $VOXTRAL_VERSION_FILE)" = "$VOXTRAL_VERSION" ]; then
                echo "[TTS Init] Voxtral weights already present (version: $VOXTRAL_VERSION)"
              else
                echo "[TTS Init] Downloading Voxtral weights ($VOXTRAL_VERSION) — operator has"
                echo "[TTS Init] accepted CC-BY-NC-4.0 by setting VOXTRAL_ACCEPT_NC_LICENSE=true."
                mkdir -p /models/voxtral
                pip install --no-cache-dir --quiet "huggingface_hub>=0.34.0"
                hf download "$VOXTRAL_VERSION" --local-dir /models/voxtral
                echo "$VOXTRAL_VERSION" > "$VOXTRAL_VERSION_FILE"
                echo "[TTS Init] Voxtral weight download complete"
              fi
            fi
          fi

          echo "[TTS Init] Model initialization complete!"
        env:
        - name: TTS_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: TTS_PROVIDER
              optional: true
        - name: VOXTRAL_ACCEPT_NC_LICENSE
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: VOXTRAL_ACCEPT_NC_LICENSE
              optional: true
        - name: VOXTRAL_MODEL_ID
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: VOXTRAL_MODEL_ID
              optional: true
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: huggingface-token
              optional: true
        volumeMounts:
        - name: model-cache
          mountPath: /models
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "4Gi"
            cpu: "1000m"
      containers:
      - name: tts-service
        image: tts-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50052
          name: grpc
        # Mount PV with models at cache directories
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/kokoro
          subPath: kokoro
        - name: model-cache
          mountPath: /root/.cache/chatterbox
          subPath: chatterbox
        - name: model-cache
          mountPath: /root/.cache/piper
          subPath: piper
        env:
        - name: GRPC_PORT
          value: "50052"
        - name: TTS_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: TTS_PROVIDER
              optional: true
        - name: ONNX_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: ONNX_PROVIDER
              optional: true
        - name: KOKORO_CACHE_DIR
          value: "/root/.cache/kokoro"
        - name: CHATTERBOX_CACHE_DIR
          value: "/root/.cache/chatterbox"
        - name: PIPER_CACHE_DIR
          value: "/root/.cache/piper"
        # Voxtral (auto-enabled when TTS_PROVIDER=voxtral). The provider in
        # this container is a thin HTTP client of the vllm-omni sidecar
        # below — it only needs to know where to find the sidecar and which
        # voice to use by default. All real inference happens in the sidecar.
        # VOXTRAL: - name: VOXTRAL_VLLM_URL
        # VOXTRAL:   value: "http://localhost:8000"
        # VOXTRAL: - name: VOXTRAL_MODEL_NAME
        # VOXTRAL:   value: "voxtral"
        # VOXTRAL: - name: VOXTRAL_DEFAULT_VOICE
        # VOXTRAL:   valueFrom:
        # VOXTRAL:     configMapKeyRef:
        # VOXTRAL:       name: stella-ai-config
        # VOXTRAL:       key: VOXTRAL_DEFAULT_VOICE
        # VOXTRAL:       optional: true
        resources:
          requests:
            memory: "2Gi"
            cpu: "250m"
            # GPU: nvidia.com/gpu: "1"
          limits:
            memory: "6Gi"
            cpu: "2000m"
            # GPU: nvidia.com/gpu: "1"
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "import grpc; channel = grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(channel).result(timeout=5)"
          # VOXTRAL_DISABLE: initialDelaySeconds: 10
          # VOXTRAL: initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import grpc; channel = grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(channel).result(timeout=5)"
          # VOXTRAL_DISABLE: initialDelaySeconds: 30
          # VOXTRAL: initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
      # ======================================================================
      # vllm-omni sidecar — only included when TTS_PROVIDER=voxtral.
      # Serves Voxtral on http://localhost:8000/v1/audio/speech, which the
      # tts-service container above talks to. Owns the GPU when active.
      # ======================================================================
      # VOXTRAL: - name: vllm-omni
      # VOXTRAL:   image: tts-vllm-omni:latest
      # VOXTRAL:   imagePullPolicy: IfNotPresent
      # VOXTRAL:   ports:
      # VOXTRAL:   - containerPort: 8000
      # VOXTRAL:     name: http
      # VOXTRAL:   env:
      # VOXTRAL:   - name: VOXTRAL_MODEL_PATH
      # VOXTRAL:     value: "/models/voxtral"
      # VOXTRAL:   - name: VOXTRAL_SERVED_NAME
      # VOXTRAL:     value: "voxtral"
      # VOXTRAL:   - name: VLLM_PORT
      # VOXTRAL:     value: "8000"
      # VOXTRAL:   - name: VOXTRAL_GPU_MEMORY_UTILIZATION
      # VOXTRAL:     valueFrom:
      # VOXTRAL:       configMapKeyRef:
      # VOXTRAL:         name: stella-ai-config
      # VOXTRAL:         key: VOXTRAL_GPU_MEMORY_UTILIZATION
      # VOXTRAL:         optional: true
      # VOXTRAL:   - name: VOXTRAL_MAX_MODEL_LEN
      # VOXTRAL:     valueFrom:
      # VOXTRAL:       configMapKeyRef:
      # VOXTRAL:         name: stella-ai-config
      # VOXTRAL:         key: VOXTRAL_MAX_MODEL_LEN
      # VOXTRAL:         optional: true
      # VOXTRAL:   - name: HF_HOME
      # VOXTRAL:     value: "/models/.hf-cache"
      # VOXTRAL:   volumeMounts:
      # VOXTRAL:   - name: model-cache
      # VOXTRAL:     mountPath: /models/voxtral
      # VOXTRAL:     subPath: voxtral
      # VOXTRAL:     readOnly: true
      # VOXTRAL:   - name: dshm
      # VOXTRAL:     mountPath: /dev/shm
      # VOXTRAL:   resources:
      # VOXTRAL:     requests:
      # VOXTRAL:       memory: "16Gi"
      # VOXTRAL:       cpu: "2000m"
      # VOXTRAL:     limits:
      # VOXTRAL:       memory: "24Gi"
      # VOXTRAL:       cpu: "4000m"
      # VOXTRAL: # NOTE: no nvidia.com/gpu resource request — STELLA's k3s setup
      # VOXTRAL: # gives GPU access via runtimeClassName: nvidia (enabled by deploy.sh
      # VOXTRAL: # when ENABLE_GPU=true). Requesting nvidia.com/gpu: 1 here would
      # VOXTRAL: # exclusively bind the GPU and starve the STT pod.
      # VOXTRAL:   readinessProbe:
      # VOXTRAL:     httpGet:
      # VOXTRAL:       path: /health
      # VOXTRAL:       port: 8000
      # VOXTRAL:     initialDelaySeconds: 60
      # VOXTRAL:     periodSeconds: 10
      # VOXTRAL:     timeoutSeconds: 5
      # VOXTRAL:     failureThreshold: 60
      # VOXTRAL:   livenessProbe:
      # VOXTRAL:     httpGet:
      # VOXTRAL:       path: /health
      # VOXTRAL:       port: 8000
      # VOXTRAL:     initialDelaySeconds: 600
      # VOXTRAL:     periodSeconds: 30
      # VOXTRAL:     timeoutSeconds: 10
      # ======================================================================
      # Volumes: PersistentVolume for model storage
      # ======================================================================
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: tts-models-pvc
      # VOXTRAL: # vllm needs >>64MB of shared memory for IPC; back /dev/shm
      # VOXTRAL: # with a sizeable tmpfs to prevent CUDA OOM during inference.
      # VOXTRAL: - name: dshm
      # VOXTRAL:   emptyDir:
      # VOXTRAL:     medium: Memory
      # VOXTRAL:     sizeLimit: 4Gi
