apiVersion: v1
kind: Service
metadata:
  name: tts-service
  namespace: ai-agents
  labels:
    app: tts-service
spec:
  selector:
    app: tts-service
  ports:
    - port: 50052
      targetPort: 50052
      name: grpc
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-service
  namespace: ai-agents
  labels:
    app: tts-service
spec:
  replicas: 1
  # Recreate (NOT the default RollingUpdate): this pod pins a single GPU and
  # requests 16Gi RAM, so a second copy can never co-schedule on the node — a
  # rolling update leaves the new pod Pending ("Insufficient memory") forever
  # while the old pod keeps the GPU, wedging the rollout. Recreate tears the old
  # pod down first, which also guarantees each start gets a clean GPU (no VRAM
  # left leaked by an overlapping previous instance).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tts-service
  template:
    metadata:
      labels:
        app: tts-service
    spec:
      # GPU: runtimeClassName: nvidia
      # ======================================================================
      # Init Container: Download Kokoro models to PersistentVolume
      # ======================================================================
      initContainers:
      - name: download-models
        image: tts-service:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "[TTS Init] Starting model download check..."

          # Get provider from env (default: piper)
          TTS_PROVIDER="${TTS_PROVIDER:-piper}"

          # ================================================================
          # Piper Model (when TTS_PROVIDER=piper or auto)
          # ================================================================
          if [ "$TTS_PROVIDER" = "piper" ] || [ "$TTS_PROVIDER" = "auto" ]; then
            PIPER_VOICE="${PIPER_VOICE:-en_US-lessac-medium}"
            PIPER_VERSION_FILE="/models/piper/.version"
            PIPER_VERSION="v1.0-${PIPER_VOICE}"

            if [ -f "$PIPER_VERSION_FILE" ] && [ "$(cat $PIPER_VERSION_FILE)" = "$PIPER_VERSION" ]; then
              echo "[TTS Init] Piper model already downloaded (version: $PIPER_VERSION)"
            else
              echo "[TTS Init] Downloading Piper model..."
              mkdir -p /models/piper
              PIPER_CACHE_DIR=/models/piper python download_piper_models.py
              echo "$PIPER_VERSION" > "$PIPER_VERSION_FILE"
              echo "[TTS Init] Piper model download complete"
            fi
          fi

          # ================================================================
          # Kokoro Model (when TTS_PROVIDER=kokoro or auto)
          # ================================================================
          if [ "$TTS_PROVIDER" = "kokoro" ] || [ "$TTS_PROVIDER" = "auto" ]; then
            KOKORO_VERSION_FILE="/models/kokoro/.version"
            KOKORO_VERSION="v1.0"

            if [ -f "$KOKORO_VERSION_FILE" ] && [ "$(cat $KOKORO_VERSION_FILE)" = "$KOKORO_VERSION" ]; then
              echo "[TTS Init] Kokoro model already downloaded (version: $KOKORO_VERSION)"
            else
              echo "[TTS Init] Downloading Kokoro model..."
              mkdir -p /models/kokoro
              KOKORO_CACHE_DIR=/models/kokoro python download_kokoro_models.py
              echo "$KOKORO_VERSION" > "$KOKORO_VERSION_FILE"
              echo "[TTS Init] Kokoro model download complete"
            fi

          fi

          # ================================================================
          # ChatterBox Model (when TTS_PROVIDER=chatterbox or auto)
          # ================================================================
          if [ "$TTS_PROVIDER" = "chatterbox" ] || [ "$TTS_PROVIDER" = "auto" ]; then
            CHATTERBOX_VERSION_FILE="/models/chatterbox/.version"
            CHATTERBOX_VERSION="multilingual-v1.0"

            if [ -f "$CHATTERBOX_VERSION_FILE" ] && [ "$(cat $CHATTERBOX_VERSION_FILE)" = "$CHATTERBOX_VERSION" ]; then
              echo "[TTS Init] ChatterBox model already downloaded (version: $CHATTERBOX_VERSION)"
            else
              echo "[TTS Init] Downloading ChatterBox multilingual model..."
              mkdir -p /models/chatterbox
              CHATTERBOX_CACHE_DIR=/models/chatterbox python download_chatterbox_models.py
              echo "$CHATTERBOX_VERSION" > "$CHATTERBOX_VERSION_FILE"
              echo "[TTS Init] ChatterBox model download complete"
            fi

          fi

          # ================================================================
          # Qwen3-TTS (when TTS_PROVIDER=qwen3)
          #
          # Qwen3-TTS weights are Apache-2.0. STELLA pre-stages them onto
          # the PVC so the in-process loader can mmap them on startup
          # without each pod restart re-downloading several GB. We also
          # copy the bundled reference clip baked into this image to the
          # PVC, unless the operator has already staged their own.
          # ================================================================
          if [ "$TTS_PROVIDER" = "qwen3" ]; then
            QWEN3_VERSION_FILE="/models/qwen3/.version"
            QWEN3_VERSION="${QWEN3_MODEL_ID:-Qwen/Qwen3-TTS-12Hz-0.6B-Base}"

            if [ -f "$QWEN3_VERSION_FILE" ] && [ "$(cat $QWEN3_VERSION_FILE)" = "$QWEN3_VERSION" ]; then
              echo "[TTS Init] Qwen3-TTS weights already present (version: $QWEN3_VERSION)"
            else
              echo "[TTS Init] Downloading Qwen3-TTS weights ($QWEN3_VERSION)..."
              mkdir -p /models/qwen3
              pip install --no-cache-dir --quiet "huggingface_hub>=0.34.0"
              hf download "$QWEN3_VERSION" --local-dir /models/qwen3
              echo "$QWEN3_VERSION" > "$QWEN3_VERSION_FILE"
              echo "[TTS Init] Qwen3-TTS weight download complete"
            fi

            # Stage the bundled reference clip + transcript on the PVC if
            # no operator override is present. The clip is read from
            # QWEN3_REF_AUDIO and the provider auto-reads the transcript
            # from the sibling .txt file next to it. Swapping voices is
            # then "drop two files on the PVC, no env edits".
            if [ ! -f /models/qwen3/ref_audio.mp3 ] && [ -f /app/assets/ref_audio.mp3 ]; then
              echo "[TTS Init] Copying bundled Qwen3 reference clip + transcript to /models/qwen3/"
              cp /app/assets/ref_audio.mp3 /models/qwen3/ref_audio.mp3
              [ -f /app/assets/ref_audio.txt ] && cp /app/assets/ref_audio.txt /models/qwen3/ref_audio.txt
            fi
          fi

          echo "[TTS Init] Model initialization complete!"
        env:
        - name: TTS_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: TTS_PROVIDER
              optional: true
        - name: QWEN3_MODEL_ID
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: QWEN3_MODEL_ID
              optional: true
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: huggingface-token
              optional: true
        volumeMounts:
        - name: model-cache
          mountPath: /models
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "4Gi"
            cpu: "1000m"
      containers:
      - name: tts-service
        image: tts-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50052
          name: grpc
        # Mount PV with models at cache directories
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/kokoro
          subPath: kokoro
        - name: model-cache
          mountPath: /root/.cache/chatterbox
          subPath: chatterbox
        - name: model-cache
          mountPath: /root/.cache/piper
          subPath: piper
        # QWEN3: - name: model-cache
        # QWEN3:   mountPath: /models/qwen3
        # QWEN3:   subPath: qwen3
        # QWEN3: - name: model-cache
        # QWEN3:   mountPath: /models/.hf-cache
        # QWEN3:   subPath: hf-cache
        env:
        - name: GRPC_PORT
          value: "50052"
        - name: TTS_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: TTS_PROVIDER
              optional: true
        - name: ONNX_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: stella-ai-config
              key: ONNX_PROVIDER
              optional: true
        - name: KOKORO_CACHE_DIR
          value: "/root/.cache/kokoro"
        - name: CHATTERBOX_CACHE_DIR
          value: "/root/.cache/chatterbox"
        - name: PIPER_CACHE_DIR
          value: "/root/.cache/piper"
        # Qwen3-TTS (auto-enabled when TTS_PROVIDER=qwen3). Runs IN-PROCESS
        # in this container via faster-qwen3-tts (no sidecar). The init
        # container pre-stages weights at /models/qwen3; QWEN3_REF_AUDIO
        # must point at a 5-10s reference clip the operator placed on the
        # PVC (default: /models/qwen3/ref_audio.mp3 — the bundled clip).
        # QWEN3: - name: QWEN3_MODEL_ID
        # QWEN3:   valueFrom:
        # QWEN3:     configMapKeyRef:
        # QWEN3:       name: stella-ai-config
        # QWEN3:       key: QWEN3_MODEL_ID
        # QWEN3:       optional: true
        # QWEN3: - name: QWEN3_MODEL_PATH
        # QWEN3:   value: "/models/qwen3"
        # QWEN3: - name: QWEN3_REF_AUDIO
        # QWEN3:   valueFrom:
        # QWEN3:     configMapKeyRef:
        # QWEN3:       name: stella-ai-config
        # QWEN3:       key: QWEN3_REF_AUDIO
        # QWEN3:       optional: true
        # Transcript is read from a sibling .txt file next to QWEN3_REF_AUDIO
        # (e.g. /models/qwen3/ref_audio.txt). Drop both files on the PVC
        # together to swap voices — no env vars to share.
        # QWEN3: - name: QWEN3_LANGUAGE
        # QWEN3:   valueFrom:
        # QWEN3:     configMapKeyRef:
        # QWEN3:       name: stella-ai-config
        # QWEN3:       key: QWEN3_LANGUAGE
        # QWEN3:       optional: true
        # QWEN3: - name: QWEN3_CHUNK_SIZE
        # QWEN3:   valueFrom:
        # QWEN3:     configMapKeyRef:
        # QWEN3:       name: stella-ai-config
        # QWEN3:       key: QWEN3_CHUNK_SIZE
        # QWEN3:       optional: true
        # QWEN3: - name: QWEN3_DTYPE
        # QWEN3:   valueFrom:
        # QWEN3:     configMapKeyRef:
        # QWEN3:       name: stella-ai-config
        # QWEN3:       key: QWEN3_DTYPE
        # QWEN3:       optional: true
        # QWEN3: - name: HF_HOME
        # QWEN3:   value: "/models/.hf-cache"
        # QWEN3: - name: HF_TOKEN
        # QWEN3:   valueFrom:
        # QWEN3:     secretKeyRef:
        # QWEN3:       name: stella-ai-secrets
        # QWEN3:       key: huggingface-token
        # QWEN3:       optional: true
        resources:
          requests:
            memory: "2Gi"
            cpu: "250m"
            # GPU: nvidia.com/gpu: "1"
          limits:
            memory: "6Gi"
            cpu: "2000m"
            # GPU: nvidia.com/gpu: "1"
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "import grpc; channel = grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(channel).result(timeout=5)"
          # QWEN3_DISABLE: initialDelaySeconds: 10
          # QWEN3: initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import grpc; channel = grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(channel).result(timeout=5)"
          # QWEN3_DISABLE: initialDelaySeconds: 30
          # QWEN3: initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
      # ======================================================================
      # Volumes: PersistentVolume for model storage
      # ======================================================================
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: tts-models-pvc
