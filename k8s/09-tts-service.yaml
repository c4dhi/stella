apiVersion: v1
kind: Service
metadata:
  name: tts-service
  namespace: ai-agents
  labels:
    app: tts-service
spec:
  selector:
    app: tts-service
  ports:
    - port: 50052
      targetPort: 50052
      name: grpc
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-service
  namespace: ai-agents
  labels:
    app: tts-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tts-service
  template:
    metadata:
      labels:
        app: tts-service
    spec:
      # GPU: runtimeClassName: nvidia
      containers:
      - name: tts-service
        image: tts-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50052
          name: grpc
        env:
        - name: GRPC_PORT
          value: "50052"
        - name: TTS_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: TTS_PROVIDER
              optional: true
        - name: ONNX_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: grace-ai-config
              key: ONNX_PROVIDER
              optional: true
        - name: KOKORO_CACHE_DIR
          value: "/root/.cache/kokoro"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
            # GPU: nvidia.com/gpu: "1"
          limits:
            memory: "2Gi"
            cpu: "2000m"
            # GPU: nvidia.com/gpu: "1"
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "import grpc; channel = grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(channel).result(timeout=5)"
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import grpc; channel = grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(channel).result(timeout=5)"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
