apiVersion: v1
kind: Service
metadata:
  name: session-management-server
  namespace: ai-agents
spec:
  selector:
    app: session-management-server
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-management-server
  namespace: ai-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-management-server
  template:
    metadata:
      labels:
        app: session-management-server
    spec:
      serviceAccountName: session-management-sa
      # Init container to dynamically discover gateway IP for LiveKit connectivity
      initContainers:
      - name: discover-livekit-host
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
        - |
          GATEWAY=$(ip route show default | awk '{print $3}' | head -1)
          echo "$GATEWAY" > /shared/gateway-ip
          echo "Discovered gateway IP: $GATEWAY"
        volumeMounts:
        - name: shared-data
          mountPath: /shared
      containers:
      - name: server
        image: session-management-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: grace-ai-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: grace-ai-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: grace-ai-secrets
              key: jwt-secret
        - name: LIVEKIT_API_KEY
          valueFrom:
            secretKeyRef:
              name: grace-ai-secrets
              key: livekit-api-key
        - name: LIVEKIT_API_SECRET
          valueFrom:
            secretKeyRef:
              name: grace-ai-secrets
              key: livekit-api-secret
        - name: LIVEKIT_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: grace-ai-secrets
              key: livekit-webhook-secret
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: grace-ai-secrets
              key: openai-api-key
        - name: ELEVENLABS_API_KEY
          valueFrom:
            secretKeyRef:
              name: grace-ai-secrets
              key: elevenlabs-api-key
        command: ["/bin/sh", "-c"]
        args:
        - |
          # Update /etc/hosts with gateway IP only in production mode
          if [ -f /shared/gateway-ip ]; then
            GATEWAY_IP=$(cat /shared/gateway-ip)

            # Only update /etc/hosts in production (Linux)
            if [ "${NODE_ENV}" = "production" ]; then
              echo "$GATEWAY_IP livekit-host host.minikube.internal" >> /etc/hosts
              echo "Production: Updated /etc/hosts with gateway IP: $GATEWAY_IP"
            else
              echo "Development: Using native host.minikube.internal resolution (gateway: $GATEWAY_IP)"
            fi
          fi
          # Start the NestJS server (run migrations first)
          exec sh -c "npx prisma migrate deploy && node dist/main"
        volumeMounts:
        - name: shared-data
          mountPath: /shared
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: shared-data
        emptyDir: {}
