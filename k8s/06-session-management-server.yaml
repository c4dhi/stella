apiVersion: v1
kind: Service
metadata:
  name: session-management-server
  namespace: ai-agents
spec:
  selector:
    app: session-management-server
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: grpc
      port: 50051
      targetPort: 50051
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-management-server
  namespace: ai-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-management-server
  template:
    metadata:
      labels:
        app: session-management-server
    spec:
      # GPU: runtimeClassName: nvidia
      serviceAccountName: session-management-sa
      initContainers:
      # Step 1: Wait for PostgreSQL to be ready
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c']
        args:
        - |
          echo "Waiting for PostgreSQL to be ready..."
          until nc -z postgres 5432; do
            echo "PostgreSQL is unavailable - sleeping 2s"
            sleep 2
          done
          echo "PostgreSQL is ready!"

      # Step 2: Run database migrations and seeding (separate init container for clear failure signaling)
      - name: run-migrations
        image: session-management-server:latest
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c']
        args:
        - |
          echo "Running Prisma migrations..."
          npx prisma migrate deploy
          RESULT=$?
          if [ $RESULT -ne 0 ]; then
            echo "✗ Migration failed with exit code: $RESULT"
            exit 1
          fi
          echo "✓ Migrations completed successfully"

          echo "Running database seed..."
          echo "  AGENT_WORKSPACE_ROOT: $AGENT_WORKSPACE_ROOT"
          npx prisma db seed
          SEED_RESULT=$?
          if [ $SEED_RESULT -ne 0 ]; then
            echo "⚠ Seeding failed (may already be seeded) - continuing..."
          else
            echo "✓ Database seeded successfully"
          fi
          exit 0
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: database-url
        # Path to mounted project directory for reading agent.yaml manifests
        - name: AGENT_WORKSPACE_ROOT
          value: "/workspace/stella-backend"
        volumeMounts:
        # Mount project directory for agent manifest discovery during seeding
        - name: project-dir
          mountPath: /workspace/stella-backend
          readOnly: true

      containers:
      - name: server
        image: session-management-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 50051
          name: grpc
        envFrom:
        - configMapRef:
            name: stella-ai-config
        env:
        # K3S: # explicit runtime flag for the readiness probe so checkContainerdHealth()
        # K3S: # only gates on `k3s ctr version` when we are actually deployed onto k3s.
        # K3S: - name: CONTAINER_RUNTIME
        # K3S:   value: "k3s"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: jwt-secret
        - name: ENV_VAR_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: env-var-encryption-key
        - name: LIVEKIT_API_KEY
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: livekit-api-key
        - name: LIVEKIT_API_SECRET
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: livekit-api-secret
        - name: LIVEKIT_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: livekit-webhook-secret
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: openai-api-key
        - name: OPENAI_PLAN_GENERATOR_API_KEY
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: openai-plan-generator-api-key
        - name: ELEVENLABS_API_KEY
          valueFrom:
            secretKeyRef:
              name: stella-ai-secrets
              key: elevenlabs-api-key
        # Tell NVIDIA container runtime to inject GPU drivers + nvidia-smi (enabled by deploy script)
        # GPU: - name: NVIDIA_VISIBLE_DEVICES
        # GPU:   value: "all"
        # Docker socket for building agent images
        - name: DOCKER_HOST
          value: "unix:///var/run/docker.sock"
        # Workspace path for agent image building (agents are in stella-backend/agents/)
        - name: AGENT_WORKSPACE_ROOT
          value: "/workspace/stella-backend"
        # Server starts directly (migrations handled by init container)
        command: ["node", "dist/src/main"]
        volumeMounts:
        # Mount Docker socket for building images
        - name: docker-sock
          mountPath: /var/run/docker.sock
        # K3s containerd socket: mount the parent directory (not the socket file)
        # so the pod transparently picks up a recreated socket if k3s restarts.
        # The "# K3S: " prefix is stripped by scripts/lib/deploy.sh on k3s targets
        # and removed entirely on non-k3s targets.
        # K3S: - name: k3s-containerd-dir
        # K3S:   mountPath: /run/k3s/containerd
        # K3S: - name: k3s-binary
        # K3S:   mountPath: /usr/local/bin/k3s
        # K3S:   readOnly: true
        # Mount project directory for agent source code (path set dynamically by deploy script)
        - name: project-dir
          mountPath: /workspace/stella-backend
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        # Liveness: only checks the Node process is alive. A broken containerd
        # should not crash-loop the pod.
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        # Readiness: also pings k3s containerd. If the host socket goes stale
        # (e.g. k3s restarts), the pod is removed from rotation until it recovers.
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        # Startup: gives the pod up to 60s to reach a ready state on first boot
        # before liveness/readiness kick in.
        startupProbe:
          httpGet:
            path: /health/ready
            port: 3000
          periodSeconds: 5
          failureThreshold: 12
      volumes:
      # Docker socket from host (for building images)
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket
      # K3S: - name: k3s-containerd-dir
      # K3S:   hostPath:
      # K3S:     path: /run/k3s/containerd
      # K3S:     type: Directory
      # K3S: - name: k3s-binary
      # K3S:   hostPath:
      # K3S:     path: /usr/local/bin/k3s
      # K3S:     type: File
      # Project directory containing agent source code (path replaced dynamically by deploy script)
      - name: project-dir
        hostPath:
          path: __PROJECT_DIR_PLACEHOLDER__
          type: Directory
