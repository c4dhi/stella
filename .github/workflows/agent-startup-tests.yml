name: Agent Startup Tests

on:
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - '.github/workflows/agent-startup-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'agents/**'
      - '.github/workflows/agent-startup-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  startup-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install test dependencies
        run: |
          uv pip install -U pytest pytest-asyncio
          uv pip install -e agents/stella-ai-agent-sdk
          uv pip install -e agents/echo-agent -e agents/stella-agent -e agents/stella-light-agent -e agents/stella-v2-agent

      - name: Run agent startup smoke tests
        run: |
          find agents -type d -name __pycache__ -prune -exec rm -rf {} +
          uv run pytest --import-mode=importlib -q \
            agents/echo-agent/tests/test_startup_config.py \
            agents/stella-agent/tests/test_startup_config.py \
            agents/stella-light-agent/tests/test_startup_config.py \
            agents/stella-v2-agent/tests/test_startup_config.py
