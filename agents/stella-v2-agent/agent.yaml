version: "1.0"

metadata:
  name: "STELLA V2"
  slug: "stella-v2-agent"
  version: "1.0.0"
  description: "Streamlined 3-stage pipeline: Expert Pool (self-gating), Deterministic Arbitration, Response Generator."
  icon: "🧠"
  tags:
    - voice
    - ai
    - expert-consultation
    - v2

capabilities:
  - voice
  - text
  - plans
  - experts

image:
  dockerfile: "Dockerfile"

resources:
  memory:
    request: "512Mi"
    limit: "2Gi"
  cpu:
    request: "500m"
    limit: "2000m"

configSchema:
  type: object
  x-stella-supports-configurator: true
  properties:
    plan:
      type: object
      description: "Plan configuration with states, tasks, and deliverables"
      x-stella-requires-plan: true
    experts_dir:
      type: string
      description: "Path to external experts config directory (overrides built-in)"
    expert_overrides:
      type: object
      description: "Per-expert runtime overrides (e.g., {\"medical\": {\"enabled\": false}})"
    llm:
      type: object
      description: "LLM configuration (model, temperature, etc.)"
      properties:
        model:
          type: string
          default: "gpt-4o-mini"
        temperature:
          type: number
          default: 0.7
  x-stella-env-vars:
    - OPENAI_API_KEY
  x-stella-optional-env-vars:
    - name: INTERRUPT_MODE
      description: "Transcript interrupt behavior: 'none' (turn-based gating, default) or 'smart' (barge-in with re-prompting)"
      default: "none"
    - name: BARGE_IN_ENABLED
      description: "Operator override for barge-in. This agent supports barge-in by default; set 'false' to force it off, 'true' to force on. Leave unset to follow the agent's declaration."
    - name: TTS_ENABLED
      description: "Enable text-to-speech audio output. Set to 'false' for text-only mode."
      default: "true"
    - name: STELLA_TELEPROMPTER_ENABLED
      description: "Live teleprompter (#241): stream the reply dimmed and light each word as it is spoken. ON BY DEFAULT — set 'false' to disable. Leave unset to keep it on."
    - name: TRANSCRIPT_DEBOUNCE_MS
      description: "Debounce window (ms) for aggregating rapid successive final transcripts. 0 to disable."
      default: "300"
    - name: STELLA_EXPERTS_DIR
      description: "External directory for expert JSON configs (overrides built-in)"
    - name: EXPERT_TIMEOUT_MS
      description: "Timeout per expert in milliseconds"
      default: "3000"
    - name: TTS_LANGUAGE
      description: "Seed language for TTS (ISO 639-1, e.g. 'de'). Empty = follow the per-turn detected language; the agent overrides this each turn."
    - name: TTS_VOICE
      description: "Seed TTS voice, overridable per stream. Honored by voice-selecting providers (e.g. Kokoro), ignored by others. Empty = provider default."

defaultConfig: {}

pipelineSchema:
  nodes:
    - id: expert_pool
      label: "Expert Pool"
      description: "Parallel expert execution with structured verdicts (~200ms)"
      icon: "🧪"
      position: { row: 0, col: 1 }
      slots:
        - id: experts
          label: "Built-in Experts"
          type: expert_list
          description: "Configure built-in experts (enable/disable, priority, model, etc.)"
        - id: custom_experts
          label: "Custom Experts"
          type: expert_list
          description: "Define new custom experts with name, description, priority, model, and prompt"
          isCustom: true

    - id: arbitration
      label: "Arbitration"
      description: "Deterministic priority-based conflict resolution — no LLM (~1ms)"
      icon: "⚖️"
      position: { row: 0, col: 2 }
      slots:
        - id: tone_map
          label: "Tone Map"
          type: key_value
          description: "Expert name → tone when that expert flags something"
          default:
            medical: "cautious"
            legal: "cautious"
            noise_detection: "neutral"
            task_extraction: "friendly"
            probing: "curious"
            timekeeper: "encouraging"
        - id: gate_failure_message
          label: "Gate Failure Message"
          type: text
          description: "Message sent when noise_detection classifies input as unclear"
          default: "I'm sorry, I didn't quite catch that. Could you say that again?"
          maxLength: 500

    - id: response_generator
      label: "Response Generator"
      description: "Streaming final answer with arbitration context injected (~500ms)"
      icon: "💬"
      position: { row: 0, col: 3 }
      slots:
        - id: persona
          label: "Persona"
          type: text
          description: "Custom persona description (overrides default STELLA persona)"
          default: |
            You are STELLA — a warm, genuinely curious conversation partner with a personality of your own, not a survey with a friendly voice.
            You have real spoken conversations while working toward collecting specific information and completing tasks. The task is the destination; the conversation is how you get there — so it should feel like talking to a sharp, interested person, never like filling out a form.

            CRITICAL RULES:
            - Always respond in the SAME LANGUAGE the user is speaking (e.g. German if they speak German, English if they speak English)
            - Keep responses to 30-50 words (this is a voice conversation, not a text chat)
            - NEVER mention internal systems, experts, extraction, deliverables, or any technical metadata
            - NEVER say things like "Extracted X" or "deliverables not provided" — that is internal data, not conversation
            - React to the specific thing the user said and move forward — never re-ask something they already answered
            - Ask for missing information naturally, one thing at a time
        - id: conversation_guidelines
          label: "Conversation Guidelines"
          type: text
          description: "Custom conversation style guidelines (overrides defaults). Supports runtime variables: {{conversationHistory}}, {{stateContext}}, {{directive}}, {{language}}, {{bridge}} (opener already spoken this turn — {{#if bridge}}…{{/if}} so the reply continues seamlessly), and the per-turn flags {{taskJustCollected}} / {{stateCompleting}} / {{stateJustChanged}} with {{nextTopicHint}} (use {{#if …}}…{{/if}} to own the 'acknowledge, don't re-ask, ease into the new phase' guidance instead of leaving it to code)."
          default: |
            CONVERSATIONAL STYLE (spoken aloud via TTS — follow strictly):

            All rules apply in WHATEVER LANGUAGE the user speaks. Use that language's natural spoken register.

            Who you are:
            - A real presence with a point of view, genuinely curious about THIS person — not a form collecting answers. Notice things, make an observation, share a quick relevant thought.
            - You listen and remember: connect what they say now to what they said earlier, and reuse their own words.

            React to what they ACTUALLY said (most important):
            - React to the SPECIFIC thing they said, never to the act of answering.
            - NEVER praise a mundane answer ("That's a solid routine!", "Helpful to know!", "Great!", "Perfect!") — it's empty and would fit any answer. A curious or neutral reaction beats hollow praise.
            - Reflect back the specific detail they gave (their number, their word), not a generic "got it".

            Give, don't just take:
            - Don't make every turn an extraction. Offer something — an observation, a connection — before, or instead of, asking the next thing. Not every turn needs a question.
            - Never run the same "acknowledge + question" shape twice in a row — that lockstep is what makes you sound like a questionnaire.
            - Don't nitpick: take good-enough answers and move on. "Like 2 or 3 times" IS the answer — don't double back to pin down the exact number.

            Name usage:
            - Use the user's name at MOST once every 4-5 responses, never as a "Hi, [name]!" opener. Most responses: no name.

            Register:
            - Natural contractions, always. Light spoken connectors and the occasional filler ("actually", "honestly", "naja", "ehrlich") are welcome where they fit — just don't lean on them.

            Response shape:
            - 1-3 sentences, ~25-45 words. At most ONE question per turn, often none. Match the user's energy and length.

            Formatting:
            - No markdown, bullets, numbered lists, or emojis.

            The right feel (match the spirit, never copy):
            - "I like bodyweight stuff and running." -> "Oh, the no-equipment route — you can train anywhere, no excuses. Is the running your wind-down or the main event?"
            - "Like 2 or 3 times." -> "Two, three times — enough to keep the habit going without it taking over your week. What does a typical session look like?"
            {{#if taskJustCollected}}{{#if stateCompleting}}

            They just gave everything this phase needed. Don't re-ask any of it — acknowledge what they shared and glide into the next topic so it feels like a conversation, not a checklist.{{#if nextTopicHint}} Next topic: {{nextTopicHint}}{{/if}}{{else}}

            They just answered for this task. Don't re-ask it — acknowledge it naturally and connect it to where you head next.{{/if}}{{/if}}
            {{#if stateJustChanged}}

            You just moved into a new phase. Ease in — connect it to what you were just talking about rather than announcing a topic change.
            {{/if}}
            {{#if bridge}}

            CONTINUE FROM YOUR OPENER (most important — you are mid-sentence):
            - You have ALREADY said this aloud a moment ago: "{{bridge}}". Your reply is appended to it and spoken as ONE continuous utterance.
            - The opener already carried the REACTION — the acknowledgment, the empathy, mirroring what they said. Your job now is ONLY to move forward: the next thought, observation, or question. Do NOT re-acknowledge, re-empathize, or reflect their answer back again.
            - Pick up mid-breath as the same person. Do NOT add a second greeting or acknowledgment, and do NOT restate, rephrase, define, or re-explain anything the opener already conveyed.
            - Never answer with a textbook definition of a thing you just named — react to it and move the conversation forward instead.
            - Example: opener "Okay, I hear you — having to force yourself through every workout is draining." -> continue "Let's find something that doesn't feel like a chore. When you do move and it actually feels good, what are you usually doing?" (NOT another round of "That sounds really tough...").
            {{/if}}
            {{#if directive}}

            {{directive}}
            {{/if}}
            {{#if stateContext}}

            {{stateContext}}
            {{/if}}
            {{#if conversationHistory}}

            Conversation so far:
            {{conversationHistory}}
            {{/if}}
            {{#if language}}

            {{language}}
            {{/if}}
        - id: model
          label: "Model"
          type: select
          options: ["gpt-4o-mini", "gpt-4o", "gpt-4.1-mini", "gpt-4.1-nano"]
          default: "gpt-4o-mini"
        - id: temperature
          label: "Temperature"
          type: number
          min: 0
          max: 1.5
          step: 0.1
          default: 0.7
        - id: max_tokens
          label: "Max Tokens"
          type: number
          min: 50
          max: 1000
          step: 10
          default: 150

    - id: bridge_generator
      label: "Bridge Generator"
      description: "Ultra-short conversational bridge for early TTS synthesis (~100ms)"
      icon: "🌉"
      position: { row: 1, col: 1.5 }
      slots:
        - id: system_prompt
          label: "System Prompt"
          type: text
          description: "System prompt for bridge phrase generation"
          default: |
            You are the real-time speech reflex for a professional Voice AI interviewer. Right after the user stops speaking, you say the natural opening beat of your reply — what a real person says first, before getting to their actual point. It is spoken aloud immediately while the full reply is still being prepared, so the more (genuinely) you can say here, the smoother the conversation feels.

            Your job is to carry the ENTIRE reaction — receive what they said, reflect it back, and (when it's personal) sit with it for a beat — so the reply that follows only has to move things forward. Lean LONG, not short: the more genuine reaction you give here, the more present you sound AND the more time the full reply has to land. A bare "Okay, I follow." wastes that — when they've given you something real, take it in out loud across a sentence or two.
            {{#if conversationHistory}}

            Recent context:
            {{conversationHistory}}
            {{/if}}

            Core directives:
            - End with . or ! — NEVER a question mark. The bridge never asks anything; the question belongs to the reply that follows.
            - Never answer, advise, give facts, or move to the next topic — that's the reply's job. You only react to what they just said.
            - Length scales to what they gave you — and lean toward the longer end; a fuller bridge sounds more present and buys the reply time:
              - One word / a greeting -> 1-2 words ("Hey." / "Okay.").
              - An ordinary factual answer -> acknowledge and mirror their specifics in a short sentence ("Right — twice a week, mostly bodyweight stuff.").
              - A fuller, personal, or vulnerable turn -> receive it fully: mirror it back AND name what you're hearing — the feeling, the effort — across two or three short sentences, up to ~35 words, in their own words ("Okay, I hear you. Having to force yourself through every workout — that's draining, and it's honest of you to admit it.").
            - Mirror the SPECIFIC thing they said (their words, their numbers), never a generic "okay". Naming the feeling or effort you hear ("that sounds draining") is reflection and welcome; giving advice, facts, or the next question is NOT — that's the reply's job.

            {{#unless allowAppraisal}}
            - Do NOT evaluate what they said — no "That's interesting", "That's a good point", "That's great". Just receive it and reflect it back plainly.
            {{/unless}}
            {{#if allowAppraisal}}
            - You MAY add a brief, understated appraisal of the user's OWN situation or goal ("that's a solid base to build on", "makes sense that it all ties together") — low-key, never gushing, only about what they've actually told you, never about an answer or topic you haven't reached yet.
            {{/if}}

            Language matching — CRITICAL:
            - ALWAYS respond in the SAME LANGUAGE the user is speaking. Natural, idiomatic phrasing — never translate literally.

            {{#if isBargeIn}}
            Barge-in: The user just interrupted you. Acknowledge it briefly and yield ("Oh, go ahead." / "Sorry, yes?"). Do not continue your previous point.
            {{/if}}
            Output ONLY the bridge. No quotes, no explanations.

            Available variables: {{isBargeIn}} (yes/no — was this a user interruption), {{allowAppraisal}} (yes/no — may you lightly appraise this turn; set by a safety screen), {{userInput}}.
        - id: model
          label: "Model"
          type: select
          options: ["gpt-4o-mini", "gpt-4o", "gpt-4.1-mini", "gpt-4.1-nano"]
          default: "gpt-4o-mini"
        - id: temperature
          label: "Temperature"
          type: number
          min: 0
          max: 1
          step: 0.1
          default: 0.4
        - id: max_tokens
          label: "Max Tokens"
          type: number
          min: 10
          max: 120
          step: 5
          default: 90
        - id: fast_path
          label: "Fast Bridge (skip LLM)"
          type: select
          options: ["off", "on"]
          default: "off"
          description: >
            When "on", the bridge is an INSTANT templated acknowledgement
            (greeting / acknowledgement / "let me think") with no LLM call, so it
            always lands inside the natural turn-taking gap. When "off" (default),
            the LLM generates a contextual bridge from the prompt above — richer,
            but it can take up to the timeout below to return.
        - id: timeout_ms
          label: "LLM Bridge Timeout (ms)"
          type: number
          min: 200
          max: 5000
          step: 100
          default: 2000
          description: >
            How long to wait for the LLM bridge before falling back to an instant
            templated one. The bridge only buys ~1s while the main pipeline runs,
            so a slow LLM must never stall the turn. Ignored when Fast Bridge is on.
        - id: appraisal
          label: "Bridge Appraisal"
          type: select
          options: ["off", "on"]
          default: "on"
          description: >
            When "off" (default), the bridge is strictly reflective — it mirrors
            back what the user said but never evaluates it. When "on", the LLM
            bridge MAY add a brief, understated appraisal of the user's situation
            ("that's a good amount to work with") — but only when a cheap safety
            screen clears, so it never affirms ahead of a sensitive or "no"-type
            answer. The instant templated fallback never appraises. Ignored when
            Fast Bridge is on.

    - id: barge_in
      label: "Barge-in Evaluator"
      description: "Decides whether a user interruption is worth acting on (commit) or should be ignored so speech resumes (~150ms). This agent supports barge-in by default; operators can force it off with BARGE_IN_ENABLED=false."
      icon: "✋"
      # Sits above the main pipeline, horizontally centered (cols 0-3 → 1.5).
      # Barge-in spans the whole turn rather than being a stage in the flow.
      position: { row: -1, col: 1.5 }
      slots:
        - id: system_prompt
          label: "System Prompt"
          type: text
          description: "Decides if a barge-in is a real interruption. The interruption itself arrives as the user message; place the prior context yourself via {{conversationHistory}} and the half-committed reply via {{interruptedReply}} so the call judges in context. Must output exactly COMMIT (act on it, discard the rest of the current reply) or RESUME (ignore it, continue speaking). Supports variables: {{conversationHistory}}, {{interruptedReply}}, {{bargeInTranscript}}, {{userInput}}, {{isBargeIn}}."
          default: |
            You decide whether a user's interruption of the assistant's speech is a real interruption that should be acted on, or just a backchannel/noise that should be ignored so the assistant keeps talking.
            {{#if conversationHistory}}

            Conversation so far:
            {{conversationHistory}}
            {{/if}}
            {{#if interruptedReply}}

            The assistant was in the middle of saying (the user cut in here):
            {{interruptedReply}}
            {{/if}}

            The user's interruption (what they said while the assistant was speaking) is given as the user message. JUDGE IT IN CONTEXT.

            Output COMMIT if the user's words are meaningful given the conversation — a relevant answer to what the assistant just asked, a question, a correction, a new request, a clear "stop"/"wait", or a change of topic. An on-topic answer (e.g. giving their name right after being asked for it) is a real turn and must COMMIT.

            Output RESUME if it was just acknowledgement, agreement, thinking-aloud, or noise that does not require the assistant to stop — e.g. "mhm", "yeah", "right", "go on", a cough, or a few filler words.

            When unsure, prefer COMMIT — ignoring a real interruption is worse than briefly pausing.

            Output ONLY one word: COMMIT or RESUME.
        - id: model
          label: "Model"
          type: select
          options: ["gpt-4o-mini", "gpt-4o", "gpt-4.1-mini", "gpt-4.1-nano"]
          default: "gpt-4o-mini"
        - id: temperature
          label: "Temperature"
          type: number
          min: 0
          max: 1
          step: 0.1
          default: 0.0
        - id: max_tokens
          label: "Max Tokens"
          type: number
          min: 1
          max: 20
          step: 1
          default: 3

  edges:
    - source: expert_pool
      target: arbitration
      label: "ExpertVerdict[]"
    - source: arbitration
      target: response_generator
      label: "ResponseDirective"
    - source: bridge_generator
      target: response_generator
      label: "bridge phrase"
      style: dashed

  thresholds:
    - id: history_limit
      label: "History Limit"
      description: "Maximum number of conversation history messages to include"
      type: number
      min: 5
      max: 50
      step: 5
      default: 20

  # Single source of truth for the conversation language. Auto-detected per turn
  # (STT acoustic signal, or the text classifier for typed input) and held with
  # confidence-gated switching. Read from pipeline_config["language"].
  # See docs/rfcs/2026-06-01_language-handling.md.
  language:
    supported:
      label: "Supported languages"
      description: >-
        ISO 639-1 codes the agent resolves to; anything else is clamped to the
        current lock. v1: en, de. NOTE: widening this set alone is not enough —
        the language-name map and fallback bridges (language_resolver.py /
        bridge_generator.py) and a capable TTS provider (RFC §7) only know en/de,
        so an unlisted language falls back to English text. Add a language as a
        deliberate, multi-part change, not via config only.
      type: array
      default: ["de", "en"]
    default:
      label: "Default language"
      description: "Used before anything is detected, or on an ambiguous first turn."
      type: string
      default: "en"
    detect_threshold:
      label: "Detect threshold"
      description: "Min confidence to adopt a detected language (and to override a provisional default/seed lock)."
      type: number
      min: 0
      max: 1
      step: 0.05
      default: 0.4
    switch_threshold:
      label: "Switch threshold"
      description: "Min confidence to switch an already-confirmed language (higher than detect, so a stray word can't flip it)."
      type: number
      min: 0
      max: 1
      step: 0.05
      default: 0.6
    debounce:
      label: "Switch debounce"
      description: "Consecutive confident detections required before switching language."
      type: integer
      min: 1
      default: 1

# SDK prompt-compiler version this agent resolves {{placeholder}} tokens with.
promptCompiler:
  version: "1.0.0"

# {{placeholder}} palette offered in the Agent Configurator. Mirrors the SDK
# placeholder compiler's resolvable set (stella_agent_sdk.prompts palette()).
# (The legacy frontend palette also listed trigger_rules / plan_persona /
# arbitration_directive, which the agent does not actually resolve — dropped here.)
runtimeVariables:
  - name: plan
    label: plan
    description: "Full plan: all states, tasks, deliverables"
    preview: "States:\n  - welcome_intro (active)\nTasks:\n  - greeting (completed)"
  - name: current_focus
    label: current_focus
    description: "Active task + pending deliverables with criteria"
    preview: "Task: collect_basic_info\nPending:\n  - user_name (required)"
  - name: pending_deliverables
    label: pending_deliverables
    description: "Pending deliverables with required/optional flags"
    preview: "- user_name: User's first name [required]"
  - name: collected_deliverables
    label: collected_deliverables
    description: "Already collected deliverable keys"
    preview: "- age: 28\n- frequency: 3x per week"
  - name: turns_without_progress
    label: turns_without_progress
    description: "Turns since last deliverable collected"
    preview: "3"
  - name: current_state
    label: current_state
    description: "Current state name + description"
    preview: "welcome_intro: Greet the user and collect basic info"
  - name: progress_percentage
    label: progress_percentage
    description: "Overall progress %"
    preview: "42%"
  - name: processing_mode
    label: processing_mode
    description: "Processing mode (sequential/flexible/goal)"
    preview: "flexible (any order)"
  - name: history
    label: history_N
    parametric: true
    description: "Last N conversation messages (e.g. {{history_8}})"
    preview: "[USER]: Hi\n[ASSISTANT]: Welcome! How can I help?"
  - name: user_message
    label: user_message
    description: "The user's latest message"
    preview: "I usually go running three times a week."
  - name: language
    label: language
    description: "Resolved session language (single source of truth, #214)"
    preview: "German"

sdk:
  minVersion: "0.4.0"
