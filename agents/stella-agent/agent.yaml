version: "1.0"

metadata:
  name: "Stella Agent"
  slug: "stella-agent"
  version: "1.0.0"
  description: "Full-featured conversational AI with expert consultation and plan execution."
  icon: "👩‍⚕️"
  tags:
    - voice
    - ai
    - expert-consultation

capabilities:
  - voice
  - text
  - plans
  - experts

image:
  dockerfile: "Dockerfile"

resources:
  memory:
    request: "512Mi"
    limit: "2Gi"
  cpu:
    request: "250m"
    limit: "1000m"

configSchema:
  type: object
  properties:
    plan:
      type: object
      description: "Plan configuration with states, tasks, and deliverables"
      x-stella-requires-plan: true
    llm:
      type: object
      description: "LLM configuration (model, temperature, etc.)"
      properties:
        model:
          type: string
          default: "gpt-4o"
        temperature:
          type: number
          default: 0.7
  x-stella-env-vars:
    - OPENAI_API_KEY
  x-stella-optional-env-vars:
    - name: INTERRUPT_MODE
      description: "Transcript interrupt behavior: 'none' (turn-based gating, default) or 'smart' (barge-in with re-prompting)"
      default: "none"
    - name: TTS_ENABLED
      description: "Enable text-to-speech audio output. Set to 'false' for text-only mode."
      default: "true"
    - name: TRANSCRIPT_DEBOUNCE_MS
      description: "Debounce window (ms) for aggregating rapid successive final transcripts. 0 to disable."
      default: "300"
    - name: DISABLE_AEC
      description: "Disable Acoustic Echo Cancellation (AEC) for debugging audio issues"
      default: "false"

defaultConfig: {}

sdk:
  minVersion: "0.4.0"
