version: "1.0"

metadata:
  name: "Stella Light"
  slug: "stella-light-agent"
  version: "1.0.0"
  description: "Lightweight conversational AI with prompt-based guardrails. Faster responses, lower cost."
  icon: "💡"
  tags:
    - voice
    - ai
    - lightweight

capabilities:
  - voice
  - text
  - plans

image:
  dockerfile: "Dockerfile"

resources:
  memory:
    request: "256Mi"
    limit: "1Gi"
  cpu:
    request: "100m"
    limit: "500m"

configSchema:
  type: object
  x-stella-supports-configurator: true
  properties:
    plan:
      type: object
      description: "Plan configuration with states, tasks, and deliverables"
      x-stella-requires-plan: true
    llm:
      type: object
      description: "LLM configuration (model, temperature, etc.)"
      properties:
        model:
          type: string
          default: "gpt-4o-mini"
        temperature:
          type: number
          default: 0.7
  x-stella-env-vars:
    - OPENAI_API_KEY
  x-stella-optional-env-vars:
    - name: INTERRUPT_MODE
      description: "Transcript interrupt behavior: 'none' (turn-based gating, default) or 'smart' (barge-in with re-prompting)"
      default: "none"
    - name: BARGE_IN_ENABLED
      description: "Operator override for barge-in. This agent supports barge-in by default; set 'false' to force it off, 'true' to force on. Leave unset to follow the agent's declaration."
    - name: BARGE_IN_EVAL_TIMEOUT_MS
      description: "Wall-clock timeout (ms) for the Barge-in Evaluator decision; defaults to COMMIT on timeout so a slow classifier never freezes the turn."
      default: "2000"
    - name: TTS_ENABLED
      description: "Enable text-to-speech audio output. Set to 'false' for text-only mode."
      default: "true"
    - name: TRANSCRIPT_DEBOUNCE_MS
      description: "Debounce window (ms) for aggregating rapid successive final transcripts. 0 to disable."
      default: "300"
    - name: DISABLE_AEC
      description: "Disable Acoustic Echo Cancellation (AEC) for debugging audio issues"
      default: "false"

defaultConfig: {}

# Pipeline configuration schema for the Agent Configurator.
# Stella Light is a single-LLM agent (no expert pool / arbitration), so it exposes
# one configurable node — the response generator — plus a history-limit threshold.
# These slots are injected at runtime through the SDK config (pipeline_config) and
# consumed in agent.py / LightPromptBuilder, exactly like stella-v2.
pipelineSchema:
  nodes:
    - id: response
      label: "Response Generator"
      description: "The single LLM call that produces the spoken response. Override its system prompt (identity + conversational style), model, and limits."
      icon: "💬"
      position: { row: 0, col: 0 }
      slots:
        - id: system_prompt
          label: "System Prompt"
          type: text
          description: "STELLA Light's identity and conversational style in one prompt (overrides the defaults). Plan system prompts, when present, are applied alongside this. Supports {{variables}}."
          default: |
            You are STELLA, a warm and engaging AI companion supporting cognitive health and wellbeing.

            Personality:
            - Friendly, warm, and genuinely interested in the person you're speaking with
            - Supportive and encouraging, never judgmental
            - Natural and conversational - avoid sounding robotic or scripted
            - Concise but thorough - aim for 30-50 words per response
            - Ask only ONE question at a time to keep the conversation flowing naturally

            ## Conversational Style (CRITICAL - Follow These Rules)
            You are a calm, observant, and grounded conversationalist. Your goal is to sound like a thoughtful peer.

            - Always respond in the SAME LANGUAGE the user is speaking.
            - Use natural contractions (don't, it's, I'm).
            - Start occasionally with a safe filler ("Yeah,", "Well,", "Right,") followed by a comma.
            - Keep responses under 4 sentences; end with one low-pressure follow-up question.
        - id: model
          label: "Model"
          type: select
          options: ["gpt-4o-mini", "gpt-4o", "gpt-4.1-mini", "gpt-4.1-nano"]
          default: "gpt-4o-mini"
        - id: temperature
          label: "Temperature"
          type: number
          min: 0
          max: 1.5
          step: 0.1
          default: 0.7
        - id: max_tokens
          label: "Max Tokens"
          type: number
          min: 50
          max: 1000
          step: 10
          default: 800

    - id: barge_in
      label: "Barge-in Evaluator"
      description: "Decides whether a user interruption is worth acting on (commit) or should be ignored so speech resumes. This agent supports barge-in by default; operators can force it off with BARGE_IN_ENABLED=false."
      icon: "✋"
      position: { row: -1, col: 0 }
      slots:
        - id: system_prompt
          label: "System Prompt"
          type: text
          description: "Decides if a barge-in is a real interruption. The conversation history is provided in the message so it judges in context. Must output exactly COMMIT (act on it, discard the rest of the current reply) or RESUME (ignore it, continue speaking). Supports variables: {{bargeInTranscript}}, {{userInput}}, {{isBargeIn}}."
          default: |
            You decide whether a user's interruption of the assistant's speech is a real interruption that should be acted on, or just a backchannel/noise that should be ignored so the assistant keeps talking.

            You are given the conversation so far and what the user just said while the assistant was speaking. JUDGE IT IN CONTEXT.

            Output COMMIT if the user's words are meaningful given the conversation — a relevant answer to what the assistant just asked, a question, a correction, a new request, a clear "stop"/"wait", or a change of topic. An on-topic answer (e.g. giving their name right after being asked for it) is a real turn and must COMMIT.

            Output RESUME if it was just acknowledgement, agreement, thinking-aloud, or noise that does not require the assistant to stop — e.g. "mhm", "yeah", "right", "go on", a cough, or a few filler words.

            When unsure, prefer COMMIT — ignoring a real interruption is worse than briefly pausing.

            Output ONLY one word: COMMIT or RESUME.
        - id: model
          label: "Model"
          type: select
          options: ["gpt-4o-mini", "gpt-4o", "gpt-4.1-mini", "gpt-4.1-nano"]
          default: "gpt-4o-mini"
        - id: temperature
          label: "Temperature"
          type: number
          min: 0
          max: 1
          step: 0.1
          default: 0.0
        - id: max_tokens
          label: "Max Tokens"
          type: number
          min: 1
          max: 20
          step: 1
          default: 3

  edges: []

  thresholds:
    - id: history_limit
      label: "History Limit"
      description: "Maximum number of conversation history messages to include in each prompt"
      type: number
      min: 5
      max: 50
      step: 5
      default: 20

# SDK prompt-compiler version this agent resolves {{placeholder}} tokens with.
# Keep in sync with PROMPT_COMPILER_VERSION in src/stella_light_agent/agent.py.
promptCompiler:
  version: "1.0.0"

# {{placeholder}} palette offered in the Agent Configurator. Mirrors the SDK
# placeholder compiler's resolvable set (stella_agent_sdk.prompts palette()).
runtimeVariables:
  - name: plan
    label: plan
    description: "Full plan: all states, tasks, deliverables"
    preview: "States:\n  - welcome_intro (active)\nTasks:\n  - greeting (completed)"
  - name: current_focus
    label: current_focus
    description: "Active task + pending deliverables with criteria"
    preview: "Task: collect_basic_info\nPending:\n  - user_name (required)"
  - name: pending_deliverables
    label: pending_deliverables
    description: "Pending deliverables with required/optional flags"
    preview: "- user_name: User's first name [required]"
  - name: collected_deliverables
    label: collected_deliverables
    description: "Already collected deliverable keys"
    preview: "- age: 28\n- frequency: 3x per week"
  - name: turns_without_progress
    label: turns_without_progress
    description: "Turns since last deliverable collected"
    preview: "3"
  - name: current_state
    label: current_state
    description: "Current state name + description"
    preview: "welcome_intro: Greet the user and collect basic info"
  - name: progress_percentage
    label: progress_percentage
    description: "Overall progress %"
    preview: "42%"
  - name: processing_mode
    label: processing_mode
    description: "Processing mode (sequential/flexible/goal)"
    preview: "flexible (any order)"
  - name: language
    label: language
    description: "Resolved session language (single source of truth, #214)"
    preview: "German"
  - name: history
    label: history_N
    parametric: true
    description: "Last N conversation messages (e.g. {{history_8}})"
    preview: "[USER]: Hi\n[ASSISTANT]: Welcome! How can I help?"
  - name: user_message
    label: user_message
    description: "The user's latest message"
    preview: "I usually go running three times a week."

sdk:
  minVersion: "0.4.0"
