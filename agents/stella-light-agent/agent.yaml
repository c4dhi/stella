version: "1.0"

metadata:
  name: "Stella Light"
  slug: "stella-light-agent"
  version: "1.0.0"
  description: "Lightweight conversational AI with prompt-based guardrails. Faster responses, lower cost."
  icon: "💡"
  tags:
    - voice
    - ai
    - lightweight

capabilities:
  - voice
  - text
  - plans

image:
  dockerfile: "Dockerfile"

resources:
  memory:
    request: "256Mi"
    limit: "1Gi"
  cpu:
    request: "100m"
    limit: "500m"

configSchema:
  type: object
  properties:
    plan:
      type: object
      description: "Plan configuration with states, tasks, and deliverables"
      x-stella-requires-plan: true
    llm:
      type: object
      description: "LLM configuration (model, temperature, etc.)"
      properties:
        model:
          type: string
          default: "gpt-4o-mini"
        temperature:
          type: number
          default: 0.7
  x-stella-env-vars:
    - OPENAI_API_KEY
  x-stella-optional-env-vars:
    - name: DISABLE_AEC
      description: "Disable Acoustic Echo Cancellation (AEC) for debugging audio issues"
      default: "false"

defaultConfig: {}

sdk:
  minVersion: "0.4.0"
